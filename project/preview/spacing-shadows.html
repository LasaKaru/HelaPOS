<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:30px 26px}
  .box{width:150px;height:74px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);display:flex;align-items:flex-end;justify-content:center;padding-bottom:9px}
  .box span{font-size:11px;color:var(--text-secondary)} .box b{color:var(--text-primary)}</style></head>
<body>
  <div class="row" style="flex-wrap:nowrap">
    <div class="box" style="box-shadow:var(--shadow-card)"><span><b>Card</b> · resting</span></div>
    <div class="box" style="box-shadow:var(--shadow-elevated)"><span><b>Elevated</b> · stat</span></div>
    <div class="box" style="box-shadow:var(--shadow-hover)"><span><b>Hover</b></span></div>
    <div class="box" style="box-shadow:var(--shadow-floating)"><span><b>Floating</b> · lifted</span></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px">Soft, neutral-black shadows; opacity deepens on hover. Dark theme uses stronger values.</p>
</body></html>
