<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:26px;background:var(--bg-secondary)}
  .tile{width:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:16px;cursor:pointer;text-align:center;transition:all var(--dur-fast) var(--ease-quick)}
  .tile.hover{border-color:var(--primary);box-shadow:var(--shadow-hover)}
  .thumb{height:64px;border-radius:8px;background:var(--bg-tertiary);display:flex;align-items:center;
    justify-content:center;font-size:32px;margin-bottom:12px}
  .nm{font-size:14px;font-weight:600} .pr{font-size:15px;font-weight:700;color:var(--primary);margin-top:4px}
  .qa{width:150px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:20px;text-align:center;box-shadow:var(--shadow-elevated)}
  .qa .ic{font-size:36px} .qa .t{font-size:15px;font-weight:600;margin-top:8px}
  .qa .s{font-size:12px;color:var(--text-secondary)}</style></head>
<body>
  <div class="row" style="align-items:stretch">
    <div class="tile"><div class="thumb">☕</div><div class="nm">Cappuccino</div><div class="pr">$4.50</div></div>
    <div class="tile hover"><div class="thumb">🥐</div><div class="nm">Croissant</div><div class="pr">$3.25</div></div>
    <div class="qa"><div class="ic">📦</div><div class="t">Inventory</div><div class="s">16 products</div></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px">Product tile &amp; quick-action tile — 12px radius; hover lifts &amp; borders turn orange, press shrinks to 0.97.</p>
</body></html>
