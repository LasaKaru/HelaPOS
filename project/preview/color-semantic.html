<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { width: 150px; height: 78px; border-radius: var(--radius-md); display:flex;
        flex-direction:column; justify-content:flex-end; padding:9px 12px; }
  .sw .name { font-size:12px; font-weight:600; color:#fff; }
  .sw .hex { font-size:10px; color:rgba(255,255,255,.85); }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--success)"><span class="name">Success</span><span class="hex mono">#10B981</span></div>
    <div class="sw" style="background:var(--warning)"><span class="name">Warning</span><span class="hex mono">#F59E0B</span></div>
    <div class="sw" style="background:var(--error)"><span class="name">Error</span><span class="hex mono">#EF4444</span></div>
    <div class="sw" style="background:var(--info)"><span class="name">Info</span><span class="hex mono">#3B82F6</span></div>
  </div>
</body></html>
