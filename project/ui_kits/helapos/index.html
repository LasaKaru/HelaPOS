    /* ───── Tables ───── */
    const HELA_FLOOR = [
      { id:"T1", seats:2 }, { id:"T2", seats:4 }, { id:"T3", seats:4 }, { id:"T4", seats:6 },
      { id:"T5", seats:2 }, { id:"T6", seats:8 }, { id:"T7", seats:4 }, { id:"T8", seats:4 },
      { id:"T9", seats:2 }, { id:"T10",seats:6 }, { id:"T11",seats:4 }, { id:"T12",seats:2 },
    ];
    const T_STATUS = {
      available:{ label:"Available", color:"var(--success)", soft:"rgba(16,185,129,.10)" },
      occupied: { label:"Occupied",  color:"var(--primary)", soft:"var(--primary-light)"  },
    };
    const tabElapsed = (ts)=>{ if(!ts) return ""; const m=Math.floor((Date.now()-ts)/60000);
      return m<1?"just now":m<60?m+"m":Math.floor(m/60)+"h "+(m%60)+"m"; };
    const tabTotal = (tab, cfg)=>window.HELA_TOTALS(tab.items||[], cfg, tab.promo).total;

    function TablesScreen({ cfg, activeTab, onSeat, onOpen, onTransfer, onMerge }) {
      const fmt = window.HELA_DATA.fmt;
      const [tabs, setTabs] = useState(()=>window.HelaDB.all("tabs").filter((t)=>t.status!=="closed"));
      const [filter, setFilter] = useState("all");
      const [move, setMove] = useState(null);   // { kind:"transfer"|"merge", tab }
      const refresh = ()=>setTabs(window.HelaDB.all("tabs").filter((t)=>t.status!=="closed"));
      const tabFor = (id)=>tabs.find((t)=>t.table===id);
      const occupied = tabs.length, free = HELA_FLOOR.length - occupied;

      const doTransfer = (dest)=>{ onTransfer(move.tab, dest); setMove(null); setTimeout(refresh,40); };
      const doMerge = (destTab)=>{ onMerge(move.tab, destTab); setMove(null); setTimeout(refresh,40); };

      let floor = HELA_FLOOR.map((f)=>({ ...f, tab:tabFor(f.id) }));
      if (filter==="available") floor = floor.filter((f)=>!f.tab);
      if (filter==="occupied")  floor = floor.filter((f)=>f.tab);

      return (
        <div>
          <SubHeader title="Tables" subtitle={occupied+" occupied · "+free+" available"}
            right={<div style={{display:"flex",gap:14,fontSize:12,color:"var(--text-secondary)",alignItems:"center"}}>
              {Object.keys(T_STATUS).map((k)=>(
                <span key={k} style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:10,height:10,borderRadius:3,background:T_STATUS[k].color}} />{T_STATUS[k].label}
                </span>
              ))}
              <button onClick={refresh} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:10,
                padding:"8px 14px",cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:12,fontWeight:600,color:"var(--text-primary)"}}>↻ Refresh</button>
            </div>} />
          <div style={{padding:"22px 30px"}}>
            <div style={{display:"flex",gap:8,marginBottom:20}}>
              {["all","available","occupied"].map((f)=>(
                <button key={f} onClick={()=>setFilter(f)} style={{fontSize:13,fontWeight:600,borderRadius:16,
                  padding:"8px 16px",border:"none",cursor:"pointer",textTransform:"capitalize",fontFamily:"var(--font-sans)",
                  background:filter===f?"var(--primary)":"var(--bg-secondary)",
                  color:filter===f?"#fff":"var(--text-secondary)"}}>{f}</button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:16}}>
              {floor.map((f)=>{
                const occ = !!f.tab;
                const s = T_STATUS[occ?"occupied":"available"];
                const isActive = occ && f.tab.id===activeTab;
                return (
                  <div key={f.id}
                    style={{background:"var(--surface)",border:"1px solid "+(isActive?"var(--primary)":"var(--border)"),
                      borderTop:"4px solid "+s.color,borderRadius:"var(--radius-lg)",padding:16,boxShadow:"var(--shadow-card)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:22,fontWeight:800}}>{f.id}</span>
                      <span style={{fontSize:11,fontWeight:700,color:s.color,background:s.soft,borderRadius:20,padding:"4px 10px"}}>
                        {isActive?"In POS":s.label}</span>
                    </div>
                    <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:6}}>🪑 {f.seats} seats</div>
                    <div style={{height:1,background:"var(--border)",margin:"12px 0"}} />
                    {occ ? (
                      <React.Fragment>
                        <div style={{fontSize:12,color:"var(--text-secondary)"}}>
                          {(f.tab.items||[]).reduce((s2,i)=>s2+i.qty,0)} items · {tabElapsed(f.tab.openedTs)}
                          <div style={{fontSize:11,color:"var(--text-tertiary)"}}>{f.tab.openedBy}</div>
                          <div style={{fontSize:18,fontWeight:800,color:"var(--text-primary)",marginTop:4}}>{fmt(tabTotal(f.tab,cfg))}</div>
                        </div>
                        <div style={{display:"flex",gap:6,marginTop:12,flexWrap:"wrap"}}>
                          <button onClick={()=>onOpen(f.tab)} style={tblBtn("var(--primary)","#fff")}>Open</button>
                          <button onClick={()=>setMove({kind:"transfer",tab:f.tab})} style={tblBtn("var(--surface)","var(--text-primary)",true)}>Transfer</button>
                          <button onClick={()=>setMove({kind:"merge",tab:f.tab})} style={tblBtn("var(--surface)","var(--text-primary)",true)}>Merge</button>
                        </div>
                      </React.Fragment>
                    ) : (
                      <button onClick={()=>onSeat(f.id)} style={{...tblBtn("var(--success)","#fff"),width:"100%"}}>＋ Seat / New order</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {move && (
            <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:55,padding:20}} onClick={()=>setMove(null)}>
              <div onClick={(e)=>e.stopPropagation()} className="anim-slide" style={{width:440,background:"var(--bg)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",overflow:"hidden"}}>
                <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)"}}>
                  <div style={{fontSize:18,fontWeight:700}}>{move.kind==="transfer"?"Transfer":"Merge"} · {move.tab.table}</div>
                  <div style={{fontSize:13,color:"var(--text-secondary)",marginTop:2}}>
                    {move.kind==="transfer" ? "Move this tab to an empty table." : "Combine this tab into another open table."}
                  </div>
                </div>
                <div style={{padding:"14px 22px",maxHeight:340,overflow:"auto"}}>
                  {move.kind==="transfer"
                    ? HELA_FLOOR.filter((f)=>!tabFor(f.id) && f.id!==move.tab.table).map((f)=>(
                        <button key={f.id} onClick={()=>doTransfer(f.id)} style={moveRow}>
                          <span style={{fontWeight:700}}>{f.id}</span><span style={{fontSize:12,color:"var(--text-secondary)"}}>🪑 {f.seats} seats</span>
                        </button>
                      ))
                    : tabs.filter((t)=>t.id!==move.tab.id).map((t)=>(
                        <button key={t.id} onClick={()=>doMerge(t)} style={moveRow}>
                          <span style={{fontWeight:700}}>{t.table}</span>
                          <span style={{fontSize:12,color:"var(--text-secondary)"}}>{(t.items||[]).reduce((s2,i)=>s2+i.qty,0)} items · {fmt(tabTotal(t,cfg))}</span>
                        </button>
                      ))}
                  {(move.kind==="transfer" ? HELA_FLOOR.filter((f)=>!tabFor(f.id) && f.id!==move.tab.table).length===0
                                           : tabs.filter((t)=>t.id!==move.tab.id).length===0) &&
                    <div style={{padding:"18px",textAlign:"center",color:"var(--text-tertiary)",fontSize:13}}>
                      {move.kind==="transfer"?"No empty tables available.":"No other open tabs to merge into."}</div>}
                </div>
                <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"flex-end"}}>
                  <Button variant="secondary" onClick={()=>setMove(null)}>Cancel</Button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    const tblBtn = (bg,col,border)=>({ flex:1,padding:"8px 10px",borderRadius:8,cursor:"pointer",fontFamily:"var(--font-sans)",
      fontSize:12.5,fontWeight:700,background:bg,color:col,border:border?"1px solid var(--border)":"none" });
    const moveRow = { width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",
      borderRadius:10,border:"1px solid var(--border)",background:"var(--surface)",cursor:"pointer",marginBottom:8,
      fontFamily:"var(--font-sans)",color:"var(--text-primary)" };

    /* ───── Orders (live: open tabs + today's bills) ───── */
    function OrdersScreen({ cfg, activeTab, onOpen }) {
      const fmt = window.HELA_DATA.fmt;
      const [tab, setTab] = useState("Open");
      const [tick, setTick] = useState(0);
      const refresh = ()=>setTick((t)=>t+1);
      const openTabs = window.HelaDB.all("tabs").filter((t)=>t.status!=="closed");
      const today = new Date(); today.setHours(0,0,0,0);
      const bills = window.HelaDB.all("bills").filter((b)=>(b.ts||0)>=today.getTime()).slice().reverse();

      const rows = tab==="Open"
        ? openTabs.map((t)=>({ key:"tab"+t.id, ref:"OPEN · "+t.table, table:t.table, type:t.type||"Dine in",
            items:(t.items||[]).reduce((s,i)=>s+i.qty,0), amount:tabTotal(t,cfg), status:"Open",
            time:tabElapsed(t.openedTs), tabObj:t }))
        : bills.filter((b)=> tab==="All" ? true : tab==="Refunds" ? b.kind==="refund" : b.kind!=="refund")
            .map((b)=>({ key:"bill"+b.id, ref:b.invoiceNo||b.no, table:b.table||"—", type:b.type||"—",
              items:(b.items||[]).reduce((s,i)=>s+i.qty,0), amount:b.total, status:b.kind==="refund"?"Refunded":"Paid",
              time:b.time||"" }));

      const STAT = { Open:{c:"var(--info)",s:"rgba(59,130,246,.10)"}, Paid:{c:"var(--success)",s:"rgba(16,185,129,.10)"},
        Refunded:{c:"var(--error)",s:"rgba(239,68,68,.10)"} };

      return (
        <div>
          <SubHeader title="Orders" subtitle={openTabs.length+" open · "+bills.filter((b)=>b.kind!=="refund").length+" billed today"}
            right={<button onClick={refresh} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",borderRadius:10,
              padding:"9px 16px",cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:13,fontWeight:600,color:"var(--text-primary)"}}>↻ Refresh</button>} />
          <div style={{padding:"22px 30px"}}>
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {["Open","All","Refunds"].map((f)=>(
                <button key={f} onClick={()=>setTab(f)} style={{fontSize:13,fontWeight:600,borderRadius:16,
                  padding:"8px 16px",border:"none",cursor:"pointer",fontFamily:"var(--font-sans)",
                  background:tab===f?"var(--primary)":"var(--bg-secondary)",color:tab===f?"#fff":"var(--text-secondary)"}}>
                  {f==="All"?"Billed today":f}
                </button>
              ))}
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",
              borderRadius:"var(--radius-lg)",overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1.3fr .8fr 1fr .7fr 1fr 1fr .9fr",
                padding:"12px 18px",background:"var(--bg-secondary)",fontSize:12,fontWeight:700,
                color:"var(--text-secondary)",borderBottom:"1px solid var(--border)"}}>
                <span>Reference</span><span>Table</span><span>Type</span><span>Items</span><span>Amount</span><span>Status</span><span>{tab==="Open"?"Action":"Time"}</span>
              </div>
              {rows.length===0 && <div style={{padding:"30px",textAlign:"center",color:"var(--text-tertiary)",fontSize:13}}>Nothing here yet.</div>}
              {rows.map((o,idx)=>{
                const s = STAT[o.status]||STAT.Paid;
                const isActive = o.tabObj && o.tabObj.id===activeTab;
                return (
                  <div key={o.key} style={{display:"grid",gridTemplateColumns:"1.3fr .8fr 1fr .7fr 1fr 1fr .9fr",
                    padding:"13px 18px",fontSize:14,alignItems:"center",
                    borderBottom:idx<rows.length-1?"1px solid var(--border)":"none"}}>
                    <span style={{fontWeight:700}}>{o.ref}</span>
                    <span style={{color:o.table==="—"?"var(--text-tertiary)":"var(--primary)",fontWeight:600}}>{o.table}</span>
                    <span style={{color:"var(--text-secondary)"}}>{o.type}</span>
                    <span style={{color:"var(--text-secondary)"}}>{o.items}</span>
                    <span style={{fontWeight:700}}>{fmt(o.amount)}</span>
                    <span><span style={{fontSize:12,fontWeight:700,color:s.c,background:s.s,borderRadius:20,padding:"4px 12px"}}>{isActive?"In POS":o.status}</span></span>
                    {o.tabObj
                      ? <button onClick={()=>onOpen(o.tabObj)} style={{...tblBtn("var(--primary)","#fff"),padding:"6px 12px",flex:"none"}}>Open</button>
                      : <span style={{color:"var(--text-secondary)"}}>{o.time}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ───── Inventory ───── */
    function InvStat({ label, value, color }) {
      return (
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",
          padding:"16px 18px",boxShadow:"var(--shadow-card)"}}>
          <div style={{fontSize:13,color:"var(--text-secondary)"}}>{label}</div>
          <div style={{fontSize:26,fontWeight:800,color:color||"var(--text-primary)",marginTop:4}}>{value}</div>
        </div>
      );
    }
    const invBtn = {width:28,height:28,borderRadius:6,border:"1px solid var(--border)",
      background:"var(--bg)",cursor:"pointer",fontSize:16,color:"var(--text-primary)",fontFamily:"var(--font-sans)"};

    function InvRow({ p, qty, photo, onAdjust, onPhoto, onEdit, canEdit }) {
      const ref = useRef(null);
      const s = (() => {
        if (qty<=0)  return { label:"Out of Stock", color:"var(--error)",   soft:"rgba(239,68,68,.10)" };
        if (qty<=10) return { label:"Low Stock",    color:"var(--info)",    soft:"rgba(59,130,246,.10)" };
        return             { label:"In Stock",      color:"var(--success)", soft:"rgba(16,185,129,.10)" };
      })();
      const fmt = window.HELA_DATA.fmt;
      const pick = (e) => { const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>onPhoto(p.id,r.result); r.readAsDataURL(f); };
      return (
        <div style={{display:"grid",gridTemplateColumns:"56px 2fr 1.1fr .9fr 1.4fr 1.1fr"+(canEdit?" 50px":""),alignItems:"center",
          gap:8,padding:"10px 18px",borderBottom:"1px solid var(--border)"}}>
          <div onClick={()=>ref.current.click()} title="Upload photo"
            style={{width:44,height:44,borderRadius:8,cursor:"pointer",overflow:"hidden",
              background:photo?("center/cover no-repeat url("+photo+")"):p.tile,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"1px solid var(--border)"}}>
            {photo?"":p.icon}
          </div>
          <input ref={ref} type="file" accept="image/*" onChange={pick} style={{display:"none"}} />
          <div>
            <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
            <div style={{fontSize:11,color:"var(--text-tertiary)"}}>SKU-{String(p.id).padStart(4,"0")}</div>
          </div>
          <div style={{fontSize:13,color:"var(--text-secondary)",textTransform:"capitalize"}}>{p.cat}</div>
          <div style={{fontWeight:700}}>{fmt(p.price)}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>onAdjust(p.id,-1)} style={invBtn}>−</button>
            <span style={{minWidth:30,textAlign:"center",fontWeight:700}}>{qty}</span>
            <button onClick={()=>onAdjust(p.id,1)}  style={invBtn}>+</button>
          </div>
          <span><span style={{fontSize:12,fontWeight:700,color:s.color,background:s.soft,borderRadius:20,padding:"4px 12px"}}>{s.label}</span></span>
          {canEdit && <button onClick={onEdit} title="Edit product" style={{...invBtn,width:32,height:32,fontSize:14}}>✏️</button>}
        </div>
      );
    }

    function InventoryScreen({ products, onAddProduct, onEditProduct, canEdit }) {
      const D = window.HELA_DATA, fmt = D.fmt;
      const [stock, setStock]   = useState(()=>window._loadStock());
      const [photos, setPhotos] = useState(()=>window.HELA_PHOTOS.load());
      const [cat, setCat]       = useState("all");
      const [query, setQuery]   = useState("");

      const adjust = (id,d) => setStock((s)=>{
        const n={...s,[id]:Math.max(0,(s[id]||0)+d)};
        window._saveStock(n); return n;
      });
      const setPhoto = (id,url) => setPhotos((p)=>{
        const n={...p,[id]:url}; window.HELA_PHOTOS.save(n); return n;
      });

      let list = products;
      if (cat!=="all") list=list.filter((p)=>p.cat===cat);
      if (query.trim()) list=list.filter((p)=>p.name.toLowerCase().includes(query.toLowerCase()));

      const vals = products.map((p)=>stock[p.id]!=null?stock[p.id]:40);
      const inStock    = vals.filter((n)=>n>10).length;
      const low        = vals.filter((n)=>n>0&&n<=10).length;
      const out        = vals.filter((n)=>n<=0).length;
      const stockValue = products.reduce((s,p)=>s+p.price*(stock[p.id]!=null?stock[p.id]:40),0);

      return (
        <div>
          <SubHeader title="Inventory & Stock" subtitle="Stock levels · tap a thumbnail to set a dish photo"
            right={canEdit && <button onClick={onAddProduct} style={{display:"flex",alignItems:"center",gap:7,background:"var(--primary)",color:"#fff",
              border:"none",borderRadius:10,padding:"10px 16px",cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:14,fontWeight:600}}>
              ＋ Add Product
            </button>} />
          <div style={{padding:"22px 30px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:22}}>
              <InvStat label="Products"      value={products.length} />
              <InvStat label="In Stock"      value={inStock}    color="var(--success)" />
              <InvStat label="Low Stock"     value={low}        color="var(--info)" />
              <InvStat label="Out of Stock"  value={out}        color="var(--error)" />
              <InvStat label="Stock Value"   value={fmt(stockValue)} />
            </div>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              {["all",...D.categories.map((c)=>c.id)].map((f)=>(
                <button key={f} onClick={()=>setCat(f)} style={{fontSize:13,fontWeight:600,borderRadius:16,
                  padding:"7px 14px",border:"none",cursor:"pointer",textTransform:"capitalize",fontFamily:"var(--font-sans)",
                  background:cat===f?"var(--primary)":"var(--bg-secondary)",color:cat===f?"#fff":"var(--text-secondary)"}}>
                  {f}
                </button>
              ))}
              <input value={query} onChange={(e)=>setQuery(e.target.value)} placeholder="Search products…"
                style={{marginLeft:"auto",padding:"9px 12px",borderRadius:8,border:"1px solid var(--border)",
                  background:"var(--bg)",color:"var(--text-primary)",fontFamily:"var(--font-sans)",fontSize:13,outline:"none",width:200}} />
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",
              overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
              <div style={{display:"grid",gridTemplateColumns:"56px 2fr 1.1fr .9fr 1.4fr 1.1fr"+(canEdit?" 50px":""),gap:8,
                padding:"12px 18px",background:"var(--bg-secondary)",fontSize:12,fontWeight:700,
                color:"var(--text-secondary)",borderBottom:"1px solid var(--border)"}}>
                <span>Photo</span><span>Product</span><span>Category</span><span>Price</span><span>Stock</span><span>Status</span>{canEdit&&<span></span>}
              </div>
              {list.map((p)=><InvRow key={p.id} p={p} qty={stock[p.id]!=null?stock[p.id]:40} photo={photos[p.id]} onAdjust={adjust} onPhoto={setPhoto} onEdit={canEdit?()=>onEditProduct(p):null} canEdit={canEdit} />)}
            </div>
          </div>
        </div>
      );
    }

    /* ───── Customers (DB-backed) ───── */
    const AV_COLORS = ["#0B1E40","#1D4ED8","#0D9488","#4F46E5","#1E293B","#13294F"];
    const initials = (n) => n.split(" ").map((w)=>w[0]).slice(0,2).join("").toUpperCase();

    function CustomerFormModal({ customer, onSave, onClose }) {
      const [name,  setName]  = useState(customer?customer.name:"");
      const [phone, setPhone] = useState(customer?customer.phone:"");
      const valid = name.trim().length>1;
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:50,padding:20}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
            style={{width:400,background:"var(--bg)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",overflow:"hidden"}}>
            <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:18,fontWeight:700}}>{customer?"Edit Customer":"Add Customer"}</div>
              <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--text-tertiary)"}}>✕</button>

    const drawerBtn = {padding:"12px 14px",borderRadius:10,border:"1px solid var(--border)",background:"var(--bg)",

    // tally a shift's cash position from sales + manual moves (used for X/Z reports)
    function shiftReport(shift) {
      const fmt = window.HELA_DATA.fmt;
      const bills = window.HelaDB.all("bills").filter((b)=>b.shiftId===shift.id);
      const sales = bills.filter((b)=>b.kind!=="refund");
      const refunds = bills.filter((b)=>b.kind==="refund");
      const by = (m)=>sales.filter((b)=>b.method===m).reduce((s,b)=>s+b.total,0);
      const cashSales = by("Cash"), cardSales = by("Card"), mobileSales = by("Mobile"), mixedSales = by("Mixed");
      const refundTotal = refunds.reduce((s,b)=>s+Math.abs(b.total),0);
      const moves = shift.moves||[];
      const cashIn  = moves.filter((m)=>m.type==="in").reduce((s,m)=>s+m.amount,0);
      const cashOut = moves.filter((m)=>m.type==="out").reduce((s,m)=>s+m.amount,0);
      const expectedCash = (shift.openFloat||0) + cashSales + cashIn - cashOut;
      const grossSales = sales.reduce((s,b)=>s+b.total,0);
      return { bills, sales, refunds, cashSales, cardSales, mobileSales, mixedSales, refundTotal,
               cashIn, cashOut, expectedCash, grossSales, txns:sales.length };
    }

    function ModifierModal({ product, onConfirm, onClose }) {
      const fmt = window.HELA_DATA.fmt;
      const groups = product.mods || [];
      const [sel, setSel] = useState(()=>{
        const init = {};
        groups.forEach((g)=>{ init[g.id] = (g.max===1 && g.required && g.options[0]) ? [g.options[0].name] : []; });
        return init;
      });
      const [qty, setQty] = useState(1);
      const [note, setNote] = useState("");

      const toggle = (g, name) => setSel((s)=>{
        const cur = s[g.id] || [];
        if (g.max===1) return { ...s, [g.id]:[name] };
        if (cur.includes(name)) return { ...s, [g.id]:cur.filter((n)=>n!==name) };
        if (cur.length >= (g.max||99)) return s;
        return { ...s, [g.id]:[...cur, name] };
      });

      const chosen = [];
      groups.forEach((g)=>(sel[g.id]||[]).forEach((name)=>{
        const o = g.options.find((x)=>x.name===name);
        if (o) chosen.push({ group:g.label, name:o.name, price:o.price||0 });
      }));
      const modTotal = chosen.reduce((s,m)=>s+m.price,0);
      const unit = Math.round((product.price+modTotal)*100)/100;
      const missing = groups.filter((g)=>g.required && !(sel[g.id]&&sel[g.id].length)).map((g)=>g.label);
      const valid = missing.length===0;

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:58,padding:20}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
            style={{width:460,maxHeight:"88vh",display:"flex",flexDirection:"column",background:"var(--bg)",
              borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",overflow:"hidden"}}>
            <div style={{padding:"16px 22px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:46,height:46,borderRadius:10,background:product.tile||"var(--bg-secondary)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flex:"none"}}>{product.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:17,fontWeight:700}}>{product.name}</div>
                <div style={{fontSize:12,color:"var(--text-secondary)"}}>Base {fmt(product.price)}</div>
              </div>
              <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--text-tertiary)"}}>✕</button>
            </div>

            <div style={{padding:"16px 22px",overflow:"auto",flex:1}}>
              {groups.map((g)=>(
                <div key={g.id} style={{marginBottom:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                    <span style={{fontSize:14,fontWeight:700}}>{g.label}
                      {g.required && <span style={{color:"var(--error)",marginLeft:4}}>*</span>}</span>
                    <span style={{fontSize:11,color:"var(--text-tertiary)"}}>
                      {g.max===1?"choose one":(g.max>=9?"choose any":"choose up to "+g.max)}</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                    {g.options.map((o)=>{
                      const on = (sel[g.id]||[]).includes(o.name);
                      return (
                        <button key={o.name} onClick={()=>toggle(g,o.name)}
                          style={{padding:"8px 13px",borderRadius:20,cursor:"pointer",fontFamily:"var(--font-sans)",
                            fontSize:13,fontWeight:600,transition:"all var(--dur-fast) var(--ease-quick)",
                            border:"1px solid "+(on?"var(--primary)":"var(--border)"),
                            background:on?"var(--primary)":"var(--surface)",color:on?"#fff":"var(--text-primary)"}}>
                          {g.max===1?"":on?"✓ ":""}{o.name}{o.price>0?" +"+fmt(o.price):""}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
              <div style={{display:"flex",alignItems:"center",gap:16,marginTop:4}}>
                <label style={{fontSize:13,fontWeight:600,color:"var(--text-secondary)"}}>Quantity</label>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <StepBtn onClick={()=>setQty((q)=>Math.max(1,q-1))}>−</StepBtn>
                  <input value={qty} onChange={(e)=>setQty(Math.max(1,parseInt(e.target.value)||1))} style={inpStyle} />
                  <StepBtn onClick={()=>setQty((q)=>q+1)}>+</StepBtn>
                </div>
              </div>
              <label style={{display:"block",fontSize:13,fontWeight:600,color:"var(--text-secondary)",marginTop:14}}>Note
                <input value={note} onChange={(e)=>setNote(e.target.value)} placeholder="e.g. no chilli, extra sauce"
                  style={{...inpStyle,width:"100%",marginTop:6,textAlign:"left"}} />
              </label>
            </div>

            <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)"}}>
              {!valid && <div style={{fontSize:12,color:"var(--error)",marginBottom:10}}>Please choose: {missing.join(", ")}</div>}
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <Button variant="secondary" onClick={onClose}>Cancel</Button>
                <button disabled={!valid} onClick={()=>onConfirm({ mods:chosen, qty, note:note.trim() })}
                  style={{...actBtn,flex:1,background:"var(--success)",color:"#fff",opacity:valid?1:.5}}>
                  Add {qty}× · {fmt(unit*qty)}

              </div>
            </div>
          </div>
        </div>
      );

    /* ───── Split bill — divide a check into separate bills (evenly or by item) ───── */
    function SplitBillModal({ cart, cfg, orderPromo, onClose, onConfirm }) {
      const fmt = window.HELA_DATA.fmt;
      const round = (x)=>Math.round(x*100)/100;
      const [mode, setMode]     = useState("even");
      const [n, setN]           = useState(2);
      const [guests, setGuests] = useState(2);
      const [assign, setAssign] = useState(()=>cart.map(()=>1));   // 1-based guest per cart line
      const blocked = !!orderPromo;                                // coupons can't combine with splits
      const whole = window.HELA_TOTALS(cart, cfg, null);
      const lineGross = (i)=>round(i.price*i.qty*(1-(i.discount||0)/100));

      const evenParts = ()=>{
        const cents=Math.round(whole.total*100), base=Math.floor(cents/n), rem=cents-base*n;
        return Array.from({length:n},(_,i)=>{
          const total=(base+(i<rem?1:0))/100, f=whole.total?total/whole.total:1/n;
          return { label:"Share "+(i+1)+" of "+n, splitLabel:(i+1)+"/"+n, items:[],
            subtotal:round(whole.subtotal*f), discount:round(whole.discount*f), service:round(whole.service*f),
            tax:round(whole.tax*f), taxRate:whole.taxRate, rounding:0, total, earn:i===0 };
        });
      };
      const guestOf = (idx)=>Math.min(assign[idx]||1, guests);
      const itemParts = ()=>{
        const out=[]; let earned=false;
        for(let g=1; g<=guests; g++){
          const it = cart.filter((_,idx)=>guestOf(idx)===g);
          if(!it.length) continue;
          const T = window.HELA_TOTALS(it, cfg, null);
          out.push({ label:"Guest "+g, splitLabel:"G"+g, items:it, subtotal:T.subtotal, discount:T.discount,
            service:T.service, tax:T.tax, taxRate:T.taxRate, rounding:T.roundingAdj, total:T.total, earn:!earned });
          earned=true;
        }
        return out;
      };
      const parts = mode==="even" ? evenParts() : itemParts();
      const sum   = round(parts.reduce((s,p)=>s+p.total,0));
      const ready = !blocked && parts.length>=2;

      const setLine = (idx,g)=>setAssign((a)=>a.map((v,j)=>j===idx?g:v));

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:55,padding:20}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide" style={{width:560,maxWidth:"95vw",maxHeight:"90vh",background:"var(--bg)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"18px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:20,fontWeight:700}}>Split Bill</div>
                <div style={{fontSize:13,color:"var(--text-secondary)",marginTop:2}}>Total {fmt(whole.total)} · settle each share separately</div>
              </div>
              <div style={{display:"flex",gap:6,background:"var(--bg-secondary)",borderRadius:10,padding:4}}>
                {[["even","Evenly"],["item","By item"]].map(([k,lab])=>(
                  <button key={k} onClick={()=>setMode(k)} style={{padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",
                    fontFamily:"var(--font-sans)",fontSize:13,fontWeight:600,
                    background:mode===k?"var(--primary)":"transparent",color:mode===k?"#fff":"var(--text-secondary)"}}>{lab}</button>
                ))}
              </div>
            </div>

            <div style={{padding:"20px 24px",overflow:"auto",flex:1}}>
              {blocked && <div style={{background:"rgba(239,68,68,.10)",color:"var(--error)",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:16}}>
                A coupon is applied to this order. Remove it before splitting the bill.</div>}

              {mode==="even" ? (
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                    <span style={{fontSize:14,fontWeight:600}}>Number of ways</span>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <button onClick={()=>setN((v)=>Math.max(2,v-1))} style={stepBtn}>−</button>
                      <span style={{fontSize:22,fontWeight:800,minWidth:28,textAlign:"center"}}>{n}</span>
                      <button onClick={()=>setN((v)=>Math.min(12,v+1))} style={stepBtn}>＋</button>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
                    {parts.map((p,i)=>(
                      <div key={i} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px"}}>
                        <div style={{fontSize:12,color:"var(--text-secondary)"}}>Share {i+1}</div>
                        <div style={{fontSize:18,fontWeight:800}}>{fmt(p.total)}</div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                    <span style={{fontSize:14,fontWeight:600}}>Guests</span>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <button onClick={()=>setGuests((v)=>Math.max(2,v-1))} style={stepBtn}>−</button>
                      <span style={{fontSize:22,fontWeight:800,minWidth:28,textAlign:"center"}}>{guests}</span>
                      <button onClick={()=>setGuests((v)=>Math.min(8,v+1))} style={stepBtn}>＋</button>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:"var(--text-secondary)",marginBottom:10}}>Tap a guest number to assign each item.</div>
                  {cart.map((it,idx)=>(
                    <div key={it.line!=null?it.line:idx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{fontSize:14,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.qty}× {it.name}</div>
                        <div style={{fontSize:12,color:"var(--text-tertiary)"}}>{fmt(lineGross(it))}</div>
                      </div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
                        {Array.from({length:guests},(_,g)=>g+1).map((g)=>(
                          <button key={g} onClick={()=>setLine(idx,g)} style={{width:30,height:30,borderRadius:8,cursor:"pointer",
                            fontFamily:"var(--font-sans)",fontSize:13,fontWeight:700,
                            border:"1px solid "+(guestOf(idx)===g?"var(--primary)":"var(--border)"),
                            background:guestOf(idx)===g?"var(--primary)":"var(--surface)",color:guestOf(idx)===g?"#fff":"var(--text-secondary)"}}>{g}</button>
                        ))}
                      </div>
                    </div>
                  ))}
                  <div style={{marginTop:14,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
                    {parts.map((p,i)=>(
                      <div key={i} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px"}}>
                        <div style={{fontSize:12,color:"var(--text-secondary)"}}>{p.label}</div>
                        <div style={{fontSize:17,fontWeight:800}}>{fmt(p.total)}</div>
                      </div>
                    ))}
                  </div>
                  {parts.length<2 && <div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:12}}>Assign items to at least two guests to split.</div>}
                </div>
              )}
            </div>

            <div style={{padding:"14px 24px",borderTop:"1px solid var(--border)",background:"var(--surface)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color: Math.abs(sum-whole.total)<0.005?"var(--text-secondary)":"var(--error)"}}>
                {parts.length} shares · {fmt(sum)}{Math.abs(sum-whole.total)>=0.005?(" (≠ "+fmt(whole.total)+")"):""}
              </div>
              <div style={{display:"flex",gap:10}}>
                <Button variant="secondary" onClick={onClose}>Cancel</Button>
                <Button disabled={!ready} onClick={()=>onConfirm(parts, whole)}>Charge {parts.length} shares →</Button>
              </div>
            </div>
          </div>
        </div>
      );
    }

      const [cat,   setCat]   = useState(product?product.cat:"lunch");
      const [price, setPrice] = useState(product?String(product.price):"");
      const [cost,  setCost]  = useState(product&&product.cost!=null?String(product.cost):"");
      const [sku,   setSku]   = useState(product&&product.sku?product.sku:"");
      const [icon,  setIcon]  = useState(product?product.icon:"🍽️");
      const [tile,  setTile]  = useState(product?product.tile:"#FDE8D8");
      const [mods,  setMods]  = useState(()=> product&&product.mods ? JSON.parse(JSON.stringify(product.mods)) : []);
      const addGroup = ()=> setMods((m)=>[...m,{ id:"g"+Date.now().toString(36), label:"New group", required:false, max:1, options:[{name:"Option 1",price:0}] }]);

    // CSV export helper — quotes fields safely and triggers a download.
    function exportCSV(filename, headers, rows) {
      const esc = (v) => '"' + String(v==null?"":v).replace(/"/g,'""') + '"';
      const csv = [headers.map(esc).join(",")].concat(rows.map((r)=>r.map(esc).join(","))).join("\n");
      const blob = new Blob(["﻿"+csv], { type:"text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
      URL.revokeObjectURL(url);
    }

    /* ───── Refund / return modal ───── */
    function RefundModal({ bill, onConfirm, onClose }) {
      const fmt = window.HELA_DATA.fmt;

      const [toCredit, setToCredit] = useState(false);   // refund to store credit instead of cash/card
      const lines = bill.items.map((i,idx)=>({ ...i, qty:qty[idx] }));
      const T = window.HELA_TOTALS(lines.filter((l)=>l.qty>0), window.HELA_CONFIG.load());
      const setQ = (idx,v)=>setQty((a)=>a.map((x,j)=>j===idx?Math.max(0,Math.min(bill.items[idx].qty,v)):x));

    function UsersScreen({ currentUser }) {
      const [rows, setRows] = useState(()=>window.HelaDB.all("users"));
      const [form, setForm] = useState(null);
      const [editRole, setEditRole] = useState(null);
      const [tick, setTick] = useState(0);  // force refresh after editing in-memory role perms
      const refresh = ()=>setRows(window.HelaDB.all("users"));
      const togglePerm = (role, perm, on) => { window.HELA_ROLES_STORE.setPerm(role, perm, on); setTick((t)=>t+1); };
      const save = async (data) => {
        const { password, ...rest } = data;
        let patch = rest;
        if (password) {  // hash only when a password was entered
          const { salt, hash } = await window.HelaCrypto.hash(password);
          patch = { ...rest, salt, hash, failed:0, lockUntil:0 };
        }
        if (form && form.id) {
          window.HelaDB.update("users", form.id, patch);
          window.HelaDB.log({ user:currentUser.username, role:currentUser.role, action:"user_update", detail:rest.username });
        } else {
          window.HelaDB.insert("users", { ...patch, active:true, created:new Date().toISOString().slice(0,10) });
          window.HelaDB.log({ user:currentUser.username, role:currentUser.role, action:"user_add", detail:rest.username+" ("+rest.role+")" });
        }
        refresh(); setForm(null);
      };
      const toggle = (u) => { window.HelaDB.update("users", u.id, { active: u.active===false }); refresh(); };
      const del = (u) => { if (u.id===currentUser.id) return; window.HelaDB.remove("users", u.id); refresh(); };

        <div>
          <SubHeader title="Users & Roles" subtitle={rows.length+" accounts · role-based access"}

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>

                const r = window.HELA_ROLES[rk];

                  <div key={rk} onClick={()=>setEditRole(on?null:rk)}
                    style={{background:on?"var(--primary-light)":"var(--surface)",border:"1px solid "+(on?"var(--primary)":"var(--border)"),
                    borderTop:"4px solid "+r.color,borderRadius:"var(--radius-lg)",padding:"14px 16px",boxShadow:"var(--shadow-card)",cursor:"pointer"}}>
                    <div style={{fontSize:15,fontWeight:700}}>{r.name}</div>
                    <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:4}}>
                      {rows.filter((u)=>u.role===rk).length} users · {r.perms.length} permissions
                    </div>
                    <div style={{fontSize:11,color:"var(--primary)",fontWeight:600,marginTop:6}}>{on?"▾ Editing permissions":"Edit permissions →"}</div>
                  </div>
                );
              })}
            </div>

            {editRole && (
              <Card style={{marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={{fontSize:16,fontWeight:700}}>{window.HELA_ROLES[editRole].name} — permissions</div>
                  <button onClick={()=>setEditRole(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--text-tertiary)"}}>✕</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
                  {window.HELA_PERMS.map((p)=>{
                    const has = window.HELA_ROLES[editRole].perms.includes(p.key);
                    const isAdminCore = editRole==="admin" && (p.key==="users"||p.key==="settings");
                    return (
                      <label key={p.key} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,
                        border:"1px solid var(--border)",cursor:isAdminCore?"not-allowed":"pointer",background:has?"var(--bg-secondary)":"var(--surface)",opacity:isAdminCore?.6:1}}>

                </div>
                <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:12}}>Changes apply immediately and are saved. Tip: keep "Settings" & "User management" on the admin role.</div>
              </Card>

            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",
              overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
              <div style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr .8fr 110px",padding:"12px 18px",

                      <button onClick={()=>toggle(u)} title="Toggle active" style={{...invBtn,width:30,height:30,fontSize:13}}>{u.active===false?"▶":"⏸"}</button>
                      <button onClick={()=>del(u)} disabled={u.id===currentUser.id} title="Delete"
                        style={{...invBtn,width:30,height:30,fontSize:13,opacity:u.id===currentUser.id?.4:1,

    /* ───── Database admin (backup / restore / reset) ───── */
    function DatabaseScreen({ onChanged }) {
      const [stats, setStats] = useState(()=>window.HelaDB.stats());
      const [msg, setMsg] = useState("");
      const [sql, setSql] = useState("SELECT json_extract(doc,'$.name') AS name,\n       json_extract(doc,'$.price') AS price\nFROM products LIMIT 10;");
      const [result, setResult] = useState(null);
      const [qErr, setQErr] = useState("");
      const fileRef = useRef(null);
      const engine = window.HelaDB.engineName();
      const isSqlite = engine==="sqlite";
      const refresh = ()=>{ setStats(window.HelaDB.stats()); onChanged&&onChanged(); };

      const download = (data, name, type) => {
        const blob = new Blob([data], {type});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href=url; a.download=name; a.click();
        URL.revokeObjectURL(url);
      };
      const exportSqlite = () => { const u8 = window.HelaDB.exportSqlite();
        if (!u8) return setMsg("SQLite engine not active.");
        download(u8, "helapos-"+new Date().toISOString().slice(0,10)+".sqlite", "application/x-sqlite3");
        setMsg("SQLite database file exported (.sqlite)."); };
      const exportJSON = () => { download(window.HelaDB.exportJSON(), "helapos-"+new Date().toISOString().slice(0,10)+".json", "application/json");
        setMsg("Database exported as JSON."); };
      const importDB = (e) => {
        const f = e.target.files&&e.target.files[0]; if (!f) return;
        const r = new FileReader();
        if (f.name.endsWith(".sqlite") || f.name.endsWith(".db")) {
          r.onload = () => { try { window.HelaDB.importSqlite(new Uint8Array(r.result)); refresh(); setMsg("SQLite file restored."); }
            catch(err){ setMsg("Import failed: "+err.message); } };
          r.readAsArrayBuffer(f);
        } else {
          r.onload = () => { try { window.HelaDB.importJSON(r.result); refresh(); setMsg("Database restored from JSON backup."); }
            catch(err){ setMsg("Import failed: invalid file."); } };
          r.readAsText(f);
        }
        e.target.value = "";
      };
      const reset = () => { if (confirm("Reset the database to seed data? This drops all saved bills, users and edits.")) {
        Promise.resolve(window.HelaDB.reset()).then(()=>{ refresh(); setMsg("Database reset to seed data."); }); } };
      const runQuery = () => {
        setQErr(""); setResult(null);
        try { const res = window.HelaDB.query(sql); setResult(res[0] || { columns:[], values:[] }); }
        catch(e){ setQErr(e.message); }
      };

      const tableMeta = { users:"User accounts & roles", products:"Menu items / catalogue", customers:"CRM & loyalty",
        bills:"Saved invoices / sales", logs:"Audit / security log", shifts:"Drawer shifts / Z-reports",
        suppliers:"Suppliers / vendors", purchases:"Goods receipts (stock in)", counters:"Auto-increment sequences" };
      const icons = { users:"👤", products:"🍽️", customers:"🧑‍🤝‍🧑", bills:"🧾", logs:"🔒",
        shifts:"💵", suppliers:"🚚", purchases:"📥", counters:"🔢" };

      return (
        <div>
          <SubHeader title="Database" subtitle="HelaDB · persistence & administration"
            right={<div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:12,fontWeight:700,color:"#fff",borderRadius:20,padding:"5px 12px",
                background:isSqlite?"var(--success)":"var(--warning)"}}>
                {isSqlite?"● SQLite (WASM)":"● JSON fallback"}
              </span>
              <span style={{fontSize:12,fontWeight:700,color:"#fff",borderRadius:20,padding:"5px 12px",
                background:window.HelaDB.isSecure()?"var(--primary)":"var(--text-tertiary)"}}>
                {window.HelaDB.isSecure()?"🔐 PBKDF2":"⚠ weak hash"}
              </span>
            </div>} />
          <div style={{padding:"22px 30px"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14,marginBottom:22}}>
              {stats.map((t)=>(
                <div key={t.table} style={{background:"var(--surface)",border:"1px solid var(--border)",
                  borderRadius:"var(--radius-lg)",padding:"16px 18px",boxShadow:"var(--shadow-card)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:24}}>{icons[t.table]||"📁"}</span>
                    <div>
                      <div style={{fontWeight:700,textTransform:"capitalize"}}>{t.table}</div>
                      <div style={{fontSize:12,color:"var(--text-tertiary)"}}>{tableMeta[t.table]||"table"}</div>
                    </div>
                  </div>
                  <div style={{fontSize:26,fontWeight:800,marginTop:10,color:"var(--primary)"}}>{t.rows}<span style={{fontSize:12,color:"var(--text-tertiary)",fontWeight:600}}> rows</span></div>
                </div>
              ))}
            </div>

            <Card style={{marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:600,marginBottom:6}}>💾 Backup & Restore</div>
              <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:16}}>
                Export a real <b>.sqlite</b> database file (or a JSON dump), or restore either format. Imports rebuild every table.
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {isSqlite && <Button onClick={exportSqlite}>⬇️ Export .sqlite</Button>}
                <Button variant={isSqlite?"secondary":"primary"} onClick={exportJSON}>⬇️ Export JSON</Button>
                <input ref={fileRef} type="file" accept=".json,.sqlite,.db,application/json" onChange={importDB} style={{display:"none"}} />
                <Button variant="secondary" onClick={()=>fileRef.current&&fileRef.current.click()}>⬆️ Import / Restore</Button>
                <Button variant="ghost" onClick={reset} style={{color:"var(--error)"}}>↺ Reset to seed</Button>
              </div>
              {msg && <div style={{marginTop:14,fontSize:13,color:"var(--success)",fontWeight:600}}>✓ {msg}</div>}
            </Card>

            {/* Live SQL console */}
            <Card style={{marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:600,marginBottom:6}}>⌨️ SQL Console</div>
              <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:14}}>
                {isSqlite ? "Run read-only SELECT / PRAGMA queries against the live SQLite engine (parameterised internally; injection-safe)."
                          : "The SQL console needs the SQLite (WASM) engine, which isn't active in this session."}
              </div>
              <textarea value={sql} onChange={(e)=>setSql(e.target.value)} disabled={!isSqlite} spellCheck={false}
                style={{width:"100%",minHeight:96,padding:12,borderRadius:8,border:"1px solid var(--border)",
                  background:"var(--bg-secondary)",color:"var(--text-primary)",fontFamily:"var(--font-mono)",fontSize:13,
                  outline:"none",resize:"vertical",opacity:isSqlite?1:.6}} />
              <div style={{display:"flex",gap:10,marginTop:10,alignItems:"center"}}>
                <Button onClick={runQuery} disabled={!isSqlite}>▶ Run query</Button>
                {qErr && <span style={{color:"var(--error)",fontSize:13}}>{qErr}</span>}
                {result && <span style={{color:"var(--text-tertiary)",fontSize:13}}>{result.values.length} row(s)</span>}
              </div>
              {result && result.columns.length>0 && (
                <div style={{marginTop:14,overflow:"auto",border:"1px solid var(--border)",borderRadius:8}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"var(--font-mono)",fontSize:12.5}}>
                    <thead><tr>{result.columns.map((c)=>(
                      <th key={c} style={{textAlign:"left",padding:"8px 12px",background:"var(--bg-secondary)",
                        borderBottom:"1px solid var(--border)",fontWeight:700,position:"sticky",top:0}}>{c}</th>))}</tr></thead>
                    <tbody>{result.values.slice(0,50).map((row,ri)=>(
                      <tr key={ri}>{row.map((v,ci)=>(
                        <td key={ci} style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",
                          color:"var(--text-secondary)",whiteSpace:"nowrap"}}>{v===null?"NULL":String(v)}</td>))}</tr>))}</tbody>
                  </table>
                </div>
              )}
            </Card>

            <Card>
              <div style={{fontSize:18,fontWeight:600,marginBottom:6}}>🗄️ Engine & Schema</div>
              <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:14}}>
                {isSqlite
                  ? <span>Backed by <b>SQLite compiled to WebAssembly (sql.js)</b>. The binary is snapshotted to <code style={{fontFamily:"var(--font-mono)"}}>localStorage["hela.sqlite.v1"]</code>; all writes use bound parameters.</span>
                  : <span>SQLite (WASM) couldn't load (offline/CDN blocked); using the encrypted JSON store at <code style={{fontFamily:"var(--font-mono)"}}>localStorage["hela.db.v1"]</code>. Same API, same data — it'll upgrade to SQLite automatically when reachable.</span>}
              </div>
              <pre style={{fontFamily:"var(--font-mono)",fontSize:12,background:"var(--bg-secondary)",borderRadius:8,
                padding:16,overflow:"auto",color:"var(--text-secondary)",margin:0}}>{`-- document tables (row stored as JSON in doc)
users     (id, doc)   -- {username, name, role, active, salt, hash, failed, lockUntil}
products  (id, doc)   -- {name, cat, price, icon, tile}
customers (id, doc)   -- {name, phone, visits, spent, points, last}
bills     (id, doc)   -- {invoiceNo, no, items[], total, method, cashier, ...}
logs      (id, doc)   -- {ts, user, role, action, detail}
counters  (name, value)

-- passwords: PBKDF2-SHA256, 120k iters, per-user 128-bit salt`}</pre>
            </Card>
          </div>
        </div>
      );
    }

      user_add:       { label:"User added",      color:"var(--info)",    icon:"👤" },
      user_update:    { label:"User edited",     color:"var(--info)",    icon:"🛠️" },

    function AuditScreen() {

      const [filter, setFilter] = useState("All");
      const filters = ["All","Sign in","Failed login","Sale","Product"];
      const match = (a) => {
        if (filter==="All") return true;
        if (filter==="Sign in") return a==="login";
        if (filter==="Failed login") return a==="login_failed"||a==="login_blocked";
        if (filter==="Sale") return a==="sale";
        if (filter==="Product") return a==="product_add"||a==="product_update";
        return true;
      };
      const list = rows.filter((r)=>match(r.action));
      const fails = rows.filter((r)=>r.action==="login_failed"||r.action==="login_blocked").length;
      const fmtTs = (ts)=>new Date(ts).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",second:"2-digit"});
      return (
        <div>
          <SubHeader title="Security · Audit Log" subtitle={rows.length+" events recorded in HelaDB"}
            right={rows.length>0 && <Button variant="secondary" onClick={()=>exportCSV(
              "helapos-audit-"+new Date().toISOString().slice(0,10)+".csv",
              ["Timestamp","Action","User","Role","Detail"],
              rows.map((r)=>[new Date(r.ts).toISOString(),r.action,r.user,r.role||"",r.detail||""]))}>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
              <InvStat label="Total Events" value={rows.length} />
              <InvStat label="Failed / Blocked Logins" value={fails} color={fails?"var(--error)":"var(--text-primary)"} />
              <InvStat label="Sales Recorded" value={rows.filter((r)=>r.action==="sale").length} color="var(--primary)" />
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              {filters.map((f)=>(
                <button key={f} onClick={()=>setFilter(f)} style={{fontSize:13,fontWeight:600,borderRadius:16,
                  padding:"7px 14px",border:"none",cursor:"pointer",fontFamily:"var(--font-sans)",
                  background:filter===f?"var(--primary)":"var(--bg-secondary)",color:filter===f?"#fff":"var(--text-secondary)"}}>{f}</button>
              ))}
            </div>
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",
              overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1.4fr 1.3fr 1fr 2fr",padding:"12px 18px",
                background:"var(--bg-secondary)",fontSize:12,fontWeight:700,color:"var(--text-secondary)",borderBottom:"1px solid var(--border)"}}>
                <span>Time</span><span>Event</span><span>User</span><span>Detail</span>
              </div>
              {list.length===0 ? (
                <div style={{padding:"40px 0",textAlign:"center",color:"var(--text-tertiary)",fontSize:13}}>No events match this filter.</div>
              ) : list.map((r,i)=>{
                const m = AUDIT_META[r.action] || { label:r.action, color:"var(--text-secondary)", icon:"•" };
                return (
                  <div key={r.id} style={{display:"grid",gridTemplateColumns:"1.4fr 1.3fr 1fr 2fr",padding:"11px 18px",
                    fontSize:13,alignItems:"center",borderBottom:i<list.length-1?"1px solid var(--border)":"none"}}>
                    <span style={{color:"var(--text-secondary)",fontFamily:"var(--font-mono)",fontSize:12}}>{fmtTs(r.ts)}</span>
                    <span><span style={{fontSize:12,fontWeight:700,color:m.color,background:m.color+"1A",borderRadius:20,padding:"3px 10px"}}>{m.icon} {m.label}</span></span>
                    <span style={{fontWeight:600}}>{r.user}</span>
                    <span style={{color:"var(--text-secondary)"}}>{r.detail}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ───── Password strength meter ───── */
    function PasswordMeter({ value }) {
      const p = window.HelaCrypto.policy(value);
      const colors = ["var(--error)","var(--error)","var(--warning)","var(--info)","var(--success)","var(--success)"];
      const c = colors[Math.min(p.score,5)];
      const Row = ({ok,label})=>(
        <span style={{fontSize:11,color:ok?"var(--success)":"var(--text-tertiary)"}}>{ok?"✓":"○"} {label}</span>
      );
      if (!value) return null;
      return (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:6}}>
            {[0,1,2,3,4].map((i)=>(
              <div key={i} style={{flex:1,height:4,borderRadius:2,background:i<p.score?c:"var(--bg-tertiary)"}} />
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:600,color:c}}>{p.label}</span>
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <Row ok={p.checks.length} label="8+ chars" /><Row ok={p.checks.upper} label="uppercase" />
            <Row ok={p.checks.lower} label="lowercase" /><Row ok={p.checks.digit} label="number" />
          </div>
        </div>
      );
    }

    /* ───── Lock screen (inactivity / manual) — keeps the session & cart ───── */
    function LockScreen({ user, onUnlock, onLogout }) {
      const [pass, setPass] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const role = window.HELA_ROLES[user.role] || { name:user.role, color:"#888" };
      const submit = async () => {
        if (busy) return; setBusy(true); setErr("");
        const u = window.HelaDB.get("users", user.id);
        const ok = u && await window.HelaCrypto.verify(pass, u.salt, u.hash);
        if (ok) { window.HelaSession.touch(); onUnlock(); } else { setErr("Incorrect password."); setBusy(false); setPass(""); }
      };
      return (
        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",
          background:"linear-gradient(135deg, var(--brand-navy) 0%, var(--brand-navy-deep) 100%)"}}>
          <div className="anim-fade" style={{width:380,background:"var(--surface)",borderRadius:"var(--radius-lg)",
            boxShadow:"var(--shadow-floating)",padding:32,textAlign:"center"}}>
            <span style={{width:60,height:60,borderRadius:"50%",background:role.color,color:"#fff",
              display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:22,marginBottom:12}}>
              {user.name.split(" ").map((w)=>w[0]).slice(0,2).join("").toUpperCase()}
            </span>
            <div style={{fontSize:20,fontWeight:800}}>{user.name}</div>
            <div style={{fontSize:12,color:role.color,fontWeight:700,marginBottom:6}}>🔒 Screen locked</div>
            <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:20}}>Enter your password to resume.</div>
            <div style={{display:"flex",flexDirection:"column",gap:12,textAlign:"left"}}>
              <Field label="Password" type="password" value={pass} onChange={setPass} placeholder="Your password" />
              {err && <div style={{color:"var(--error)",fontSize:12}}>{err}</div>}
              <Button full onClick={submit} style={{height:44}}>{busy?"Checking…":"Unlock"}</Button>
              <Button full variant="ghost" onClick={onLogout}>Sign out instead</Button>
            </div>
          </div>
        </div>
      );
    }

    /* ───── Change password (self-service) ───── */
    function ChangePasswordModal({ user, onClose, onDone }) {
      const [cur, setCur] = useState("");
      const [nw, setNw] = useState("");
      const [confirm, setConfirm] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const submit = async () => {
        setErr("");
        const pol = window.HelaCrypto.policy(nw);
        if (!pol.ok) return setErr("New password doesn't meet the policy.");
        if (nw !== confirm) return setErr("Passwords don't match.");
        setBusy(true);
        const u = window.HelaDB.get("users", user.id);
        const ok = u && await window.HelaCrypto.verify(cur, u.salt, u.hash);
        if (!ok) { setErr("Current password is incorrect."); setBusy(false); return; }
        const { salt, hash } = await window.HelaCrypto.hash(nw);
        window.HelaDB.update("users", user.id, { salt, hash });
        window.HelaDB.log({ user:user.username, role:user.role, action:"password_change", detail:"self-service" });
        onDone && onDone();
      };
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:70,padding:20}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
            style={{width:400,background:"var(--bg)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",overflow:"hidden"}}>
            <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:18,fontWeight:700}}>Change Password</div>
              <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"var(--text-tertiary)"}}>✕</button>
            </div>
            <div style={{padding:"20px 22px",display:"flex",flexDirection:"column",gap:14}}>
              <Field label="Current Password" type="password" value={cur} onChange={setCur} />
              <Field label="New Password" type="password" value={nw} onChange={setNw} />
              <PasswordMeter value={nw} />
              <Field label="Confirm New Password" type="password" value={confirm} onChange={setConfirm} />
              {err && <div style={{color:"var(--error)",fontSize:12}}>{err}</div>}
            </div>
            <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",display:"flex",gap:10,justifyContent:"flex-end"}}>
              <Button variant="secondary" onClick={onClose}>Cancel</Button>
              <Button disabled={busy} onClick={submit}>{busy?"Saving…":"Update Password"}</Button>
            </div>
          </div>
        </div>
      );
    }

    function ManagerAuthModal({ action, onApprove, onClose }) {
      const [uname, setUname] = useState("");
      const [pass, setPass] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const submit = async () => {
        setErr(""); setBusy(true);

    /* ───── Purchasing: suppliers + goods receiving (stock in) ───── */
    function PurchasingScreen({ products, user }) {
      const fmt = window.HELA_DATA.fmt;
      const [tab, setTab] = useState("receive");
      const [suppliers, setSuppliers] = useState(()=>window.HelaDB.all("suppliers"));
      const [purchases, setPurchases] = useState(()=>window.HelaDB.all("purchases").slice().reverse());
      const [supForm, setSupForm] = useState(null);
      const refresh = ()=>{ setSuppliers(window.HelaDB.all("suppliers")); setPurchases(window.HelaDB.all("purchases").slice().reverse()); };

      // receive form
      const [supplierId, setSupplierId] = useState(suppliers[0]?suppliers[0].id:null);
      const [lines, setLines] = useState([]);
      const [pid, setPid] = useState(products[0]?products[0].id:"");
      const [qty, setQty] = useState("");
      const [cost, setCost] = useState("");
      const addLine = () => {
        const p = products.find((x)=>x.id===parseInt(pid)); const q=parseInt(qty)||0; const c=parseFloat(cost);
        if(!p||q<=0) return;
        setLines((l)=>[...l,{ id:p.id, name:p.name, qty:q, cost:isNaN(c)?(p.cost||0):c }]);
        setQty(""); setCost("");
      };
      const lineTotal = lines.reduce((s,l)=>s+l.qty*l.cost,0);
      const receive = () => {
        if(!lines.length||!supplierId) return;
        const sup = window.HelaDB.get("suppliers", supplierId) || {};
        const stock = window._loadStock();
        lines.forEach((l)=>{ stock[l.id]=(stock[l.id]||0)+l.qty;
          const prod = window.HelaDB.get("products", l.id); if(prod) window.HelaDB.update("products", l.id, { cost:l.cost }); });
        window._saveStock(stock);
        const poNo = "PO-"+String(window.HelaDB.counter("po")).padStart(5,"0");
        const now = new Date();
        window.HelaDB.insert("purchases", { poNo, supplierId, supplier:sup.name, lines, total:Math.round(lineTotal*100)/100,
          status:"received", date:now.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          ts:now.getTime(), by:user?user.name:"Admin" });
        window.HelaDB.log({ user:user.username, role:user.role, action:"goods_received", detail:poNo+" · "+sup.name+" · "+fmt(lineTotal) });
        setLines([]); refresh(); setTab("history");
      };
      const saveSupplier = (data) => {
        if (supForm && supForm.id) window.HelaDB.update("suppliers", supForm.id, data);
        else window.HelaDB.insert("suppliers", data);
        refresh(); setSupForm(null);
      };

      return (
        <div>
          <SubHeader title="Purchasing" subtitle="Suppliers & stock receiving"
            right={<div style={{display:"flex",gap:8}}>
              {[["receive","Receive Stock"],["suppliers","Suppliers"],["history","History"]].map(([k,l])=>(
                <button key={k} onClick={()=>setTab(k)} style={{fontSize:13,fontWeight:600,borderRadius:16,padding:"8px 16px",border:"none",cursor:"pointer",fontFamily:"var(--font-sans)",
                  background:tab===k?"var(--primary)":"var(--bg-secondary)",color:tab===k?"#fff":"var(--text-secondary)"}}>{l}</button>
              ))}
            </div>} />
          <div style={{padding:"22px 30px"}}>
            {tab==="receive" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:16}}>
                <Card>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:14}}>Goods Receipt — add items</div>
                  <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                    <label style={{fontSize:13,fontWeight:600}}>Supplier</label>
                    <select value={supplierId||""} onChange={(e)=>setSupplierId(parseInt(e.target.value))}
                      style={{padding:"10px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text-primary)",fontFamily:"var(--font-sans)",fontSize:14}}>
                      {suppliers.map((s)=><option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"2fr .8fr 1fr auto",gap:8,alignItems:"end"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      <label style={{fontSize:12,color:"var(--text-secondary)"}}>Product</label>
                      <select value={pid} onChange={(e)=>setPid(e.target.value)}
                        style={{padding:"9px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text-primary)",fontFamily:"var(--font-sans)",fontSize:13}}>
                        {products.map((p)=><option key={p.id} value={p.id}>{p.name}</option>)}
                      </select>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}><label style={{fontSize:12,color:"var(--text-secondary)"}}>Qty</label>
                      <input value={qty} onChange={(e)=>setQty(e.target.value)} placeholder="0" style={{...inpStyle,width:"100%"}} /></div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}><label style={{fontSize:12,color:"var(--text-secondary)"}}>Unit cost</label>
                      <input value={cost} onChange={(e)=>setCost(e.target.value)} placeholder="0.00" style={{...inpStyle,width:"100%"}} /></div>
                    <Button onClick={addLine} style={{height:40}}>Add</Button>
                  </div>
                  <div style={{marginTop:16}}>
                    {lines.length===0 ? <div style={{fontSize:13,color:"var(--text-tertiary)"}}>No lines yet.</div> :
                      lines.map((l,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                        <span style={{fontSize:14}}>{l.qty} × {l.name} @ {fmt(l.cost)}</span>
                        <span style={{display:"flex",gap:10,alignItems:"center"}}><b>{fmt(l.qty*l.cost)}</b>
                          <button onClick={()=>setLines((a)=>a.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-tertiary)"}}>✕</button></span>
                      </div>
                    ))}
                  </div>
                </Card>
                <Card style={{height:"fit-content"}}>
                  <div style={{fontSize:16,fontWeight:700,marginBottom:12}}>Summary</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,color:"var(--text-secondary)"}}><span>Lines</span><b style={{color:"var(--text-primary)"}}>{lines.length}</b></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{fontWeight:700}}>Total cost</span><span style={{fontWeight:800,color:"var(--primary)"}}>{fmt(lineTotal)}</span></div>
                  <Button full disabled={!lines.length} onClick={receive} style={{height:46}}>✓ Receive into stock</Button>
                  <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:10}}>Increases on-hand stock and updates each product's cost price.</div>
                </Card>
              </div>
            )}

            {tab==="suppliers" && (
              <div>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
                  <Button onClick={()=>setSupForm({})}>＋ Add Supplier</Button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
                  {suppliers.map((s)=>(
                    <div key={s.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:16,boxShadow:"var(--shadow-card)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div style={{fontWeight:700,fontSize:15}}>{s.name}</div>
                        <button onClick={()=>setSupForm(s)} style={{...invBtn,width:30,height:30,fontSize:13}}>✏️</button>
                      </div>
                      <div style={{fontSize:12,color:"var(--text-secondary)",marginTop:8,lineHeight:1.8}}>
                        <div>📞 {s.phone||"—"}</div><div>✉️ {s.email||"—"}</div>
                        <div>Terms: <b style={{color:"var(--text-primary)"}}>{s.terms||"—"}</b></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {tab==="history" && (
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden",boxShadow:"var(--shadow-card)"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1.6fr .8fr 1fr 1.4fr",padding:"12px 18px",background:"var(--bg-secondary)",fontSize:12,fontWeight:700,color:"var(--text-secondary)",borderBottom:"1px solid var(--border)"}}>
                  <span>PO #</span><span>Supplier</span><span>Items</span><span>Total</span><span>Date</span>
                </div>
                {purchases.length===0 ? <div style={{padding:"40px",textAlign:"center",color:"var(--text-tertiary)",fontSize:13}}>No goods received yet.</div> :
                  purchases.map((p,i)=>(
                  <div key={p.id} style={{display:"grid",gridTemplateColumns:"1fr 1.6fr .8fr 1fr 1.4fr",padding:"12px 18px",fontSize:14,alignItems:"center",borderBottom:i<purchases.length-1?"1px solid var(--border)":"none"}}>
                    <span style={{fontWeight:700,color:"var(--primary)"}}>{p.poNo}</span>
                    <span>{p.supplier}</span>
                    <span style={{color:"var(--text-secondary)"}}>{p.lines.reduce((s,l)=>s+l.qty,0)}</span>
                    <span style={{fontWeight:700}}>{fmt(p.total)}</span>
                    <span style={{color:"var(--text-tertiary)",fontSize:12}}>{p.date}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {supForm && <SupplierFormModal supplier={supForm.id?supForm:null} onSave={saveSupplier} onClose={()=>setSupForm(null)} />}
        </div>
      );
    }

    /* ───── Kitchen Display System (KDS) — live order tickets ───── */
    const KDS_FLOW = ["New","Preparing","Ready","Served"];
    const KDS_COLOR = { New:"var(--warning)", Preparing:"var(--info)", Ready:"var(--success)", Served:"var(--text-tertiary)" };
    function KitchenScreen() {
      const [bills, setBills] = useState(()=>window.HelaDB.all("bills"));
      const [tick, setTick] = useState(0);
      useEffect(()=>{ const iv=setInterval(()=>setBills(window.HelaDB.all("bills")), 4000); return ()=>clearInterval(iv); }, []);
      const today = new Date(); today.setHours(0,0,0,0);
      const tickets = bills.filter((b)=>b.kind!=="refund" && (b.ts||0)>=today.getTime())
        .map((b)=>({ ...b, kds:b.kds||"New" }));
      const advance = (b)=>{ const i=KDS_FLOW.indexOf(b.kds||"New"); const next=KDS_FLOW[Math.min(i+1,KDS_FLOW.length-1)];
        window.HelaDB.update("bills", b.id, { kds:next }); setBills(window.HelaDB.all("bills")); setTick((t)=>t+1); };
      const cols = ["New","Preparing","Ready"];
      const elapsed = (ts)=>{ if(!ts) return ""; const m=Math.floor((Date.now()-ts)/60000); return m<1?"just now":m+"m ago"; };
      return (
        <div>
          <SubHeader title="Kitchen Display" subtitle={"Today · "+tickets.filter((t)=>t.kds!=="Served").length+" active tickets"}
            right={<button onClick={()=>setBills(window.HelaDB.all("bills"))} style={{background:"var(--bg-secondary)",border:"1px solid var(--border)",
              borderRadius:10,padding:"9px 16px",cursor:"pointer",fontFamily:"var(--font-sans)",fontSize:13,fontWeight:600,color:"var(--text-primary)"}}>↻ Refresh</button>} />
          <div style={{padding:"22px 30px"}}>
            {tickets.length===0 ? (
              <div style={{padding:"60px 0",textAlign:"center",color:"var(--text-tertiary)"}}>
                <div style={{fontSize:48,marginBottom:10}}>👨‍🍳</div>
                <div style={{fontSize:16,fontWeight:600,color:"var(--text-secondary)"}}>No tickets today</div>
                <div style={{fontSize:13}}>Completed orders appear here for the kitchen to prepare.</div>
              </div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,alignItems:"start"}}>
                {cols.map((col)=>{
                  const list = tickets.filter((t)=>t.kds===col);
                  return (
                    <div key={col}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                        <span style={{width:10,height:10,borderRadius:3,background:KDS_COLOR[col]}} />
                        <span style={{fontWeight:700}}>{col}</span>
                        <span style={{fontSize:12,color:"var(--text-tertiary)"}}>({list.length})</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:12}}>
                        {list.map((t)=>(
                          <div key={t.id} style={{background:"var(--surface)",border:"1px solid var(--border)",borderTop:"4px solid "+KDS_COLOR[col],
                            borderRadius:"var(--radius-lg)",padding:14,boxShadow:"var(--shadow-card)"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                              <span style={{fontWeight:800}}>{t.no}</span>
                              <span style={{fontSize:11,color:"var(--text-tertiary)"}}>{elapsed(t.ts)}</span>
                            </div>
