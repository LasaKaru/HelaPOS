                                  {i.mods&&i.mods.length>0&&<div style={{fontSize:11,color:"var(--text-secondary)",paddingLeft:18}}>+ {window.HELA_MODLABEL(i.mods)}</div>}
                                  {i.note&&<div style={{fontSize:11,color:"var(--warning-dark)",paddingLeft:18}}>★ {i.note}</div>}
                                </div>

                            </div>
                            <button onClick={()=>advance(t)} style={{marginTop:10,width:"100%",padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",
                              fontFamily:"var(--font-sans)",fontSize:13,fontWeight:700,color:"#fff",

                              {col==="New"?"Start preparing →":col==="Preparing"?"Mark ready →":"Mark served ✓"}
                            </button>
                          </div>
                        ))}
                        {list.length===0 && <div style={{fontSize:12,color:"var(--text-tertiary)",textAlign:"center",padding:"16px 0"}}>—</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );

    /* ───── Root app ───── */
    function App() {
      const [screen, setScreen]       = useState("login");
      const [user, setUser]           = useState(null);
      const [cart, setCart]           = useState([]);
      const [table, setTable]         = useState(null);
      const [query, setQuery]         = useState("");
      const [pay, setPay]             = useState(null);
      const [receipt, setReceipt]     = useState(null);
      const [cfg, setCfg]             = useState(()=>window.HELA_CONFIG.load());
      const [orderType, setOrderType] = useState("Dine in");
      const [held, setHeld]           = useState([]);
      const [products, setProducts]   = useState(()=>window.HelaDB.all("products"));
      const [orderCustomer, setOrderCustomer] = useState(null);
      const [custModal, setCustModal] = useState(false);
      const [kot, setKot]             = useState(null);
      const [splitOpen, setSplitOpen] = useState(false);
      const [prodEdit, setProdEdit]   = useState(null);
      const [toast, setToast]         = useState(null);
      const [sessionWarn, setSessionWarn] = useState(false);
      const [locked, setLocked]       = useState(false);   // lock screen overlay
      const [changePw, setChangePw]   = useState(false);   // change-password modal
      const [mgrAuth, setMgrAuth]     = useState(null);     // { action, onApprove } pending override
      const [shift, setShift]         = useState(()=>window.HelaDB.all("shifts").find((s)=>s.status==="open")||null);
      const [orderPromo, setOrderPromo] = useState(null);   // applied coupon { code, type, value, label }
      const [modPick, setModPick]     = useState(null);     // { product } pending modifier selection
      const [activeTab, setActiveTab] = useState(null);     // id of the open table tab loaded into the POS

      // Apply currency synchronously during render so fmt() is correct in the SAME
      // render pass (children read window.HELA_CUR when they render, after this runs).
      window.HELA_CUR = window.HELA_CURRENCIES[cfg.currency] || window.HELA_CURRENCIES.USD;

      // Theme + accent + persistence can run post-render (they touch the DOM / storage).
      useEffect(()=>{
        window.HELA_CONFIG.apply(cfg);
        window.HELA_CONFIG.save(cfg);
      }, [cfg]);

      // Restore an existing valid session on first mount (survives refresh).
      useEffect(()=>{
        if (window.HelaSession.valid()) {
          const s = window.HelaSession.get();
          const u = window.HelaDB.get("users", s.userId);
          if (u && u.active!==false) { setUser({ id:u.id, name:u.name, username:u.username, role:u.role }); setScreen("dashboard"); }
          else window.HelaSession.clear();
        }
      }, []);

      const can = (perm) => user && window.HELA_CAN(user.role, perm);
      const flash = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2200); };

      // Inactivity guard: refresh the session on activity; warn before expiry; then
      // either LOCK the screen (keep cart) or sign out, per Settings → Security.
      useEffect(()=>{
        if (!user || locked) return;
        const bump = () => { window.HelaSession.touch(); if (sessionWarn) setSessionWarn(false); };
        const evts = ["mousedown","keydown","touchstart"];
        evts.forEach((e)=>window.addEventListener(e, bump));
        const iv = setInterval(()=>{
          const left = window.HelaSession.remaining();
          if (left<=0) {
            setSessionWarn(false);
            if ((cfg.lockMode||"lock")==="lock") { window.HelaDB.log({ user:user.username, role:user.role, action:"lock", detail:"inactivity" }); setLocked(true); }
            else doLogout("timeout");
          } else if (left<=60000) setSessionWarn(true);
        }, 5000);
        return ()=>{ evts.forEach((e)=>window.removeEventListener(e, bump)); clearInterval(iv); };
      }, [user, sessionWarn, locked, cfg.lockMode]);

      const lockNow = ()=>{ if (user) { window.HelaDB.log({ user:user.username, role:user.role, action:"lock", detail:"manual" }); setLocked(true); } };

      const orderTotal = (items, promo) => window.HELA_TOTALS(items, cfg, promo).total;
      // Best auto-promotion for the current cart (suppressed when a manual coupon is set).
      const autoPromo = orderPromo ? null : window.HELA_AUTOPROMO(cart, cfg);
      const resetOrder = ()=>{ setCart([]); setTable(null); setOrderType("Dine in"); setOrderCustomer(null); setOrderPromo(null); setActiveTab(null); };

      // ----- Table tabs (open orders tied to a table) -----
      // Upsert the current POS order onto its table's tab (one tab per table, always).
      const upsertCurrentTab = ()=>{
        if (!table || !cart.length) return null;
        const data = { table, type:orderType, customer:orderCustomer, promo:orderPromo, items:cart, status:"open" };
        const existing = (activeTab && window.HelaDB.get("tabs", activeTab)) ? activeTab
          : (window.HelaDB.all("tabs").find((t)=>t.table===table && t.status!=="closed")||{}).id || null;
        if (existing) { window.HelaDB.update("tabs", existing, data); return existing; }
        const now=new Date();
        const t = window.HelaDB.insert("tabs", { ...data, guests:null, openedBy:user?user.name:"Admin",
          openedById:user?user.id:null, openedAt:now.toLocaleString("en-GB"), openedTs:now.getTime() });
        return t.id;
      };
      const stashCurrent = ()=>{ upsertCurrentTab(); };
      const loadTab = (t)=>{ stashCurrent(); const f = window.HelaDB.get("tabs", t.id) || t;
        setCart(f.items||[]); setTable(f.table); setOrderType(f.type||"Dine in");
        setOrderCustomer(f.customer||null); setOrderPromo(f.promo||null); setActiveTab(f.id); setScreen("home");
        flash("Opened "+f.table); };
      const seatTable = (tableId)=>{ stashCurrent(); setCart([]); setTable(tableId); setOrderType("Dine in");
        setOrderCustomer(null); setOrderPromo(null); setActiveTab(null); setScreen("home"); flash("Seated "+tableId); };
      const saveTab = ()=>{
        if (!table || !cart.length) { flash("Pick a table and add items first"); return; }
        upsertCurrentTab();
        if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"tab_save", detail:table+" · "+cart.length+" line(s)" });
        flash("Table "+table+" saved"); resetOrder(); setScreen("tables");
      };
      const transferTab = (t, dest)=>{ window.HelaDB.update("tabs", t.id, { table:dest });
        if (activeTab===t.id) setTable(dest);
        if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"tab_transfer", detail:t.table+" → "+dest });
        flash("Transferred "+t.table+" → "+dest); };
      const mergeTabs = (src, dest)=>{ const merged=[...(dest.items||[]),...(src.items||[])];
        window.HelaDB.update("tabs", dest.id, { items:merged }); window.HelaDB.remove("tabs", src.id);
        if (activeTab===src.id) { setActiveTab(dest.id); setTable(dest.table); setCart(merged); }
        else if (activeTab===dest.id) setCart(merged);
        if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"tab_merge", detail:src.table+" → "+dest.table });
        flash("Merged "+src.table+" into "+dest.table); };
      // Add a product to the cart. Modifier selections become a distinct line; their
      // upcharge is baked into the line's unit price so HELA_TOTALS works unchanged.
      // Identical lines (same product + mods + note) merge by quantity.
      const addLine = (p, opts) => {
        opts = opts || {};
        const mods = opts.mods || [];
        const note = opts.note || "";
        const qty  = opts.qty || 1;
        const modTotal = mods.reduce((s,m)=>s+(m.price||0),0);
        const unit = Math.round((p.price+modTotal)*100)/100;
        const sig = p.id + "##" + window.HELA_MODSIG(mods, note);
        setCart((c)=>{
          const f = c.find((i)=>i.sig===sig);
          if (f) return c.map((i)=>i.sig===sig?{...i,qty:i.qty+qty}:i);
          return [...c, { id:p.id, name:p.name, cat:p.cat, icon:p.icon, tile:p.tile,
            basePrice:p.price, price:unit, cost:p.cost, qty, discount:0, note, mods,
            sig, line:window.HELA_UID() }];
        });
      };
      // Tap/scan a product: if it has modifier groups, open the picker first.
      const requestAdd = (p)=>{ if (p && p.mods && p.mods.length) setModPick({ product:p }); else addLine(p, { qty:1 }); };
      const addToCart = (p)=>requestAdd(p);   // barcode / SKU quick-add
      const onSearchEnter = (qq)=>{ const s=(qq||"").trim().toLowerCase(); if(!s) return;
        const p = products.find((x)=>(x.sku||"").toLowerCase()===s) || products.find((x)=>x.name.toLowerCase()===s)
          || (products.filter((x)=>x.name.toLowerCase().includes(s)).length===1 ? products.find((x)=>x.name.toLowerCase().includes(s)) : null);
        if(p){ if(!can("sell")) return; addToCart(p); setQuery(""); if(screen!=="home") setScreen("home"); flash("Added "+p.name); }
        else flash("No product for \""+qq+"\""); };
      const onHold   = ()=>{ if (!cart.length) return;
        setHeld((h)=>[...h,{id:Date.now(),items:cart,table,type:orderType,customer:orderCustomer,promo:orderPromo,
          total:orderTotal(cart,orderPromo),time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}]);
        resetOrder(); flash("Order held"); };
      const onRecall = (h)=>{ setCart(h.items); setTable(h.table); setOrderType(h.type); setOrderCustomer(h.customer||null); setOrderPromo(h.promo||null);
        setHeld((p)=>p.filter((x)=>x.id!==h.id)); };
      const onLogin  = (u)=>{ setUser(u); setScreen("dashboard"); };
      const doLogout = (reason)=>{ window.HelaAuth.logout(user, reason); resetOrder(); setSessionWarn(false);
        setUser(null); setScreen("login"); };
      const logout   = ()=>doLogout("manual");

      // Proceed → KOT first, then payment
      const onProceed = (amt) => setKot({ items:cart, table, type:orderType, total:amt });
      // A "charge" describes exactly what one bill collects (full order or one split share).
      const wholeCharge = () => {
        const promoUsed = orderPromo || window.HELA_AUTOPROMO(cart, cfg);
        const T = window.HELA_TOTALS(cart, cfg, promoUsed);
        return { items:cart, subtotal:T.subtotal, discount:T.discount, service:T.service, tax:T.tax,
          taxRate:T.taxRate, rounding:T.roundingAdj, total:T.total, coupon:promoUsed?promoUsed.code:null,
          autoPromo:!!(promoUsed&&promoUsed.auto), splitLabel:null, earn:true };
      };
      const onKotSend = () => { setKot(null); const c = wholeCharge();
        setPay({ total:c.total, charge:c, queue:[], paidBills:[], summary:null, splitN:1 }); };
      const startSplit = (parts, summary) => {
        if (!parts || parts.length<2) return;
        setSplitOpen(false);
        const [first,...rest] = parts;
        setPay({ total:first.total, charge:first, queue:rest, paidBills:[], summary, splitN:parts.length });
      };

      // Persist one bill for a charge + payment details. Loyalty/spend accrue only on the
      // charge flagged `earn` (the primary share of a split); credit redemption always applies.
      const recordBill = (charge, details) => {
        const billSeq = window.HelaDB.counter("bill");
        const invSeq  = window.HelaDB.counter("invoice");
        const no        = "ORD-"+String(billSeq).padStart(5,"0");
        const invoiceNo = (cfg.invoicePrefix||"INV")+"-"+String(invSeq).padStart(5,"0");
        const total = charge.total;
        const earn  = charge.earn!==false;
        const earned = earn ? Math.floor(total/2) : 0;   // 1 loyalty point per $2 spent
        const now = new Date();
        const cost = (charge.items||[]).reduce((s,i)=>s+(i.cost!=null?i.cost:0)*i.qty,0);
        const sale = { no, invoiceNo, table, type:orderType, customer:orderCustomer, earned, kind:"sale",
          date:now.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          time:now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}), ts:now.getTime(),
          items:charge.items||[], subtotal:charge.subtotal, discount:charge.discount, service:charge.service, tax:charge.tax,
          coupon:charge.coupon||null, autoPromo:!!charge.autoPromo, split:charge.splitLabel||null,
          taxRate:charge.taxRate, rounding:charge.rounding||0, total, cost:Math.round(cost*100)/100,
          shiftId:shift?shift.id:null, cashier:user?user.name:"Admin", ...details };
        window.HelaDB.insert("bills", sale);
        if (orderCustomer) {
          const c = window.HelaDB.get("customers", orderCustomer.id);
          if (c) {
            const upd = {};
            const used = Math.min(details.creditUsed||0, c.credit||0);   // clamp to avoid overspend
            if (used>0) upd.credit = Math.round(((c.credit||0)-used)*100)/100;
            if (earn) { upd.points=(c.points||0)+earned; upd.spent=Math.round(((c.spent||0)+total)*100)/100;
              upd.visits=(c.visits||0)+1; upd.last="Today"; }
            if (Object.keys(upd).length) window.HelaDB.update("customers", c.id, upd);
            if (used>0 && user) window.HelaDB.log({ user:user.username, role:user.role, action:"credit_redeem",
              detail:c.name+" · "+window.HELA_DATA.fmt(used)+" on "+invoiceNo });
          }
        }
        if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"sale",
          detail:invoiceNo+" · "+window.HELA_DATA.fmt(total)+" · "+details.method+(charge.splitLabel?(" · split "+charge.splitLabel):"") });
        return sale;
      };
      const onPaid = (details) => {
        const sale = recordBill(pay.charge, details);
        const paidBills = [...(pay.paidBills||[]), sale];
        if (pay.queue && pay.queue.length) {            // more split shares to collect
          const [next,...rest] = pay.queue;
          setPay({ ...pay, total:next.total, charge:next, queue:rest, paidBills });
          return;
        }
        if (activeTab && window.HelaDB.get("tabs", activeTab)) window.HelaDB.remove("tabs", activeTab);   // tab settled
        if (pay.splitN>1) {                             // show a settlement summary, not a single bill
          setReceipt({ ...pay.summary, rounding:pay.summary.roundingAdj, invoiceNo:"SPLIT ×"+pay.splitN,
            table, type:orderType, customer:orderCustomer, kind:"sale", items:cart,
            cashier:user?user.name:"Admin", date:sale.date, time:sale.time,
            splitInfo:{ parts:pay.splitN, bills:paidBills.map((b)=>({ invoiceNo:b.invoiceNo, total:b.total, method:b.method })) } });
        } else setReceipt(sale);
        setPay(null);
      };
      const closeReceipt = (again)=>{ setReceipt(null); setCart([]); setOrderType("Dine in"); setOrderCustomer(null); setOrderPromo(null);
        if(!again) setTable(null); setScreen("home"); };

      // ----- Shift / drawer session -----
      const openShift = (float) => {
        const now = new Date();
        const s = window.HelaDB.insert("shifts", { status:"open", openedBy:user.name, openedById:user.id,
          openFloat:float, openedAt:now.toLocaleString("en-GB"), openedTs:now.getTime(), moves:[] });
        setShift(s); window.HelaDB.log({ user:user.username, role:user.role, action:"shift_open", detail:"float "+window.HELA_DATA.fmt(float) });
        flash("Shift opened");
      };
      const addCashMove = (reason, amount, type) => {
        if (!shift) return;
        const moves = [...(shift.moves||[]), { reason, amount, type, time:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}) }];
        const upd = window.HelaDB.update("shifts", shift.id, { moves }); setShift(upd);
        window.HelaDB.log({ user:user.username, role:user.role, action:"cash_"+type, detail:reason+" "+window.HELA_DATA.fmt(amount) });
      };
      const closeShift = (countedCash) => {
        if (!shift) return;
        const now = new Date();
        const upd = window.HelaDB.update("shifts", shift.id, { status:"closed", closedBy:user.name,
          closedAt:now.toLocaleString("en-GB"), closedTs:now.getTime(), countedCash });
        window.HelaDB.log({ user:user.username, role:user.role, action:"shift_close", detail:"counted "+window.HELA_DATA.fmt(countedCash) });
        setShift(null); flash("Shift closed"); return upd;
      };

      // ----- Refund / return against a saved invoice -----
      const refundBill = (orig, lines, reason, toCredit) => {
        const refundItems = lines.filter((l)=>l.qty>0).map((l)=>({ ...l }));
        if (!refundItems.length) return;
        const T = window.HELA_TOTALS(refundItems, cfg);
        const seq = window.HelaDB.counter("invoice");
        const now = new Date();
        // Refund to store credit only if the original sale had a customer on file.
        const credit = !!(toCredit && orig.customer);
        const rb = { kind:"refund", refundOf:orig.invoiceNo, no:"REF-"+String(window.HelaDB.counter("bill")).padStart(5,"0"),
          invoiceNo:(cfg.invoicePrefix||"INV")+"-R"+String(seq).padStart(5,"0"),
          date:now.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}),
          time:now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}), ts:now.getTime(),
          type:orig.type, table:orig.table, customer:orig.customer, items:refundItems,
          subtotal:-T.subtotal, discount:-T.discount, service:-T.service, tax:-T.tax, total:-T.total,
          method:credit?"Store Credit":orig.method, toCredit:credit, reason, cashier:user?user.name:"Admin", shiftId:shift?shift.id:null };
        window.HelaDB.insert("bills", rb);
        if (credit) {
          const c = window.HelaDB.get("customers", orig.customer.id);
          if (c) {
            const next = Math.round(((c.credit||0)+T.total)*100)/100;
            window.HelaDB.update("customers", c.id, { credit:next });
            window.HelaDB.log({ user:user.username, role:user.role, action:"credit_refund",
              detail:c.name+" +"+window.HELA_DATA.fmt(T.total)+" from "+orig.invoiceNo+" → "+window.HELA_DATA.fmt(next) });
          }
        }
        window.HelaDB.log({ user:user.username, role:user.role, action:"refund",
          detail:rb.invoiceNo+" of "+orig.invoiceNo+" · "+window.HELA_DATA.fmt(T.total)+(credit?" (store credit)":"") });
        flash(credit?"Refunded to store credit":"Refund recorded");
        return rb;
      };

      // Product add/edit — persisted to HelaDB
      const saveProduct = (data) => {
        if (prodEdit && prodEdit.id) {
          window.HelaDB.update("products", prodEdit.id, data);
          if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"product_update", detail:data.name });
          flash("Product updated");
        } else {
          window.HelaDB.insert("products", data);
          if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"product_add", detail:data.name });
          flash("Product added");
        }
        setProducts(window.HelaDB.all("products"));
        setProdEdit(null);
      };

      // Run fn if the current user is a manager/admin, else require a manager override (logged).
      const requireManager = (action, fn) => {
        if (user && (user.role==="admin" || user.role==="manager")) fn(user);
        else setMgrAuth({ action, onApprove:(mgr)=>{ setMgrAuth(null); fn(mgr); } });
      };
      const onVoid = () => { if (!cart.length) return;
        requireManager("Voiding the current order", ()=>{
          if (activeTab && window.HelaDB.get("tabs", activeTab)) window.HelaDB.remove("tabs", activeTab);
          resetOrder(); flash("Order voided"); }); };

      if (screen==="login") return <LoginScreen cfg={cfg} onLogin={onLogin} />;

      // role-gate: if a screen isn't permitted, fall back to dashboard
      const navItem = NAV.find((n)=>n.id===screen);
      const allowed = !navItem || !navItem.perm || can(navItem.perm);
      const active  = allowed ? screen : "dashboard";

      let content;
      if      (active==="dashboard") content = <DashboardScreen onNavigate={setScreen} user={user} />;
      else if (active==="settings")  content = <SettingsScreen cfg={cfg} setCfg={setCfg} onChangePassword={()=>setChangePw(true)} />;
      else if (active==="customers") content = <CustomersScreen canEdit={can("customers.edit")} />;
      else if (active==="tables")    content = <TablesScreen cfg={cfg} activeTab={activeTab}
                                          onSeat={seatTable} onOpen={loadTab} onTransfer={transferTab} onMerge={mergeTabs} />;
      else if (active==="cashier")   content = <CashierScreen shift={shift} user={user}
                                          onOpen={openShift} onClose={closeShift} onMove={addCashMove} />;
      else if (active==="invoices")  content = <InvoicesScreen cfg={cfg}
                                          onRefund={(orig,lines,reason,toCredit)=>requireManager("Refund "+orig.invoiceNo, ()=>refundBill(orig,lines,reason,toCredit))} />;
      else if (active==="users")     content = <UsersScreen currentUser={user} />;
      else if (active==="audit")     content = <AuditScreen />;
      else if (active==="reports")   content = <ReportsScreen cfg={cfg} />;
      else if (active==="database")  content = <DatabaseScreen onChanged={()=>setProducts(window.HelaDB.all("products"))} />;
      else if (active==="inventory") content = <InventoryScreen products={products} canEdit={can("inventory.edit")}
                                          onAddProduct={()=>setProdEdit({})} onEditProduct={(p)=>setProdEdit(p)} />;
      else if (active==="purchasing") content = <PurchasingScreen products={products} user={user} />;
      else if (active==="kitchen")   content = <KitchenScreen />;
      else if (active==="orders")    content = <OrdersScreen cfg={cfg} activeTab={activeTab} onOpen={loadTab} />;

      return (
        <div style={{height:"100vh",display:"flex",background:"var(--bg)"}}>
          <Rail screen={active} setScreen={setScreen} onLogout={logout} user={user} />
          <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
            <TopBar cfg={cfg} setCfg={setCfg} query={query} setQuery={setQuery} table={table} setTable={setTable}
              user={user} canSell={can("sell")} onLock={lockNow} onChangePw={()=>setChangePw(true)} onLogout={logout}
              onSearch={onSearchEnter} />
            <div style={{flex:1,overflow:"auto",minHeight:0}}>
              {active==="home"
                ? <HomeScreen cart={cart} setCart={setCart} table={table} query={query}
                    products={products} onProceed={onProceed} orderType={orderType}
                    setOrderType={setOrderType} held={held} onHold={onHold} onRecall={onRecall}
                    orderCustomer={orderCustomer} onPickCustomer={()=>setCustModal(true)} cfg={cfg}
                    promo={orderPromo} setPromo={setOrderPromo} onAdd={requestAdd} autoPromo={autoPromo} onSaveTab={saveTab}
                    onSplit={()=>{ if(cart.length) setSplitOpen(true); }}
                    onVoid={onVoid} discountLimit={cfg.discountLimit==null?100:cfg.discountLimit}
                    freeDiscount={user && (user.role==="admin"||user.role==="manager")} requireManager={requireManager} />
                : content}
            </div>
          </div>

          {custModal && <CustomerSelectModal customers={window.HelaDB.all("customers")} selected={orderCustomer}
            onSelect={(c)=>{ setOrderCustomer(c); setCustModal(false); }} onClose={()=>setCustModal(false)} />}
          {modPick && <ModifierModal product={modPick.product}
            onConfirm={({mods,qty,note})=>{ addLine(modPick.product,{mods,qty,note}); setModPick(null); }}
            onClose={()=>setModPick(null)} />}
          {kot     && <KOTModal order={kot} onSendAndPay={onKotSend} onClose={()=>setKot(null)} />}
          {splitOpen && <SplitBillModal cart={cart} cfg={cfg} orderPromo={orderPromo} onClose={()=>setSplitOpen(false)} onConfirm={startSplit} />}
          {pay     && <PaymentModal key={"pay"+(pay.paidBills?pay.paidBills.length:0)} total={pay.total} customer={orderCustomer}
                        caption={pay.splitN>1 ? ("Split share "+(pay.charge.splitLabel||"")+" · "+((pay.paidBills?pay.paidBills.length:0)+1)+" of "+pay.splitN) : null}
                        onClose={()=>setPay(null)} onComplete={onPaid} />}
          {receipt && <ReceiptModal sale={receipt} cfg={cfg} onClose={()=>closeReceipt(false)} onNewSale={()=>closeReceipt(true)} />}
          {prodEdit && <ProductEditModal product={prodEdit.id?prodEdit:null} onSave={saveProduct} onClose={()=>setProdEdit(null)} />}
          {changePw && <ChangePasswordModal user={user} onClose={()=>setChangePw(false)} onDone={()=>{ setChangePw(false); flash("Password updated"); }} />}
          {mgrAuth && <ManagerAuthModal action={mgrAuth.action} onApprove={mgrAuth.onApprove} onClose={()=>setMgrAuth(null)} />}
          {locked && <LockScreen user={user} onUnlock={()=>setLocked(false)} onLogout={()=>{ setLocked(false); doLogout("manual"); }} />}

          {sessionWarn && (
            <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.5)",display:"flex",
              alignItems:"center",justifyContent:"center",zIndex:90}}>
              <div className="anim-slide" style={{width:380,background:"var(--bg)",borderRadius:"var(--radius-lg)",
                boxShadow:"var(--shadow-floating)",padding:26,textAlign:"center"}}>
                <div style={{fontSize:40,marginBottom:10}}>⏳</div>
                <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Session expiring soon</div>
                <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:20}}>
                  You'll be signed out shortly due to inactivity. Stay signed in to continue.
                </div>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <Button onClick={()=>{ window.HelaSession.touch(); setSessionWarn(false); }}>Stay signed in</Button>
                  <Button variant="secondary" onClick={()=>doLogout("manual")}>Sign out</Button>
                </div>
              </div>
            </div>
          )}

          {toast && (
            <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:80,
              background:"var(--brand-navy)",color:"#fff",padding:"12px 22px",borderRadius:10,
              boxShadow:"var(--shadow-floating)",fontSize:14,fontWeight:600}} className="anim-slide">
              ✓ {toast}
            </div>
          )}
        </div>
      );
    }

    /* ───── Boot splash while the database engine initializes ───── */
    function Boot({ note }) {
      return (
        <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          gap:18,background:"linear-gradient(135deg, var(--bg) 0%, var(--bg-secondary) 100%)"}}>
          <div style={{width:54,height:54,borderRadius:15,background:"var(--brand-navy)",color:"#fff",
            display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:24}}>H</div>
          <div style={{fontSize:20,fontWeight:800,color:"var(--text-primary)"}}>HelaPOS</div>
          <div style={{width:200,height:4,background:"var(--bg-secondary)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:"40%",background:"var(--primary)",animation:"helaIndet 1s linear infinite"}} />
          </div>
          <div style={{fontSize:12,color:"var(--text-tertiary)"}}>{note||"Starting database…"}</div>
        </div>
      );
    }

    /* ───── Unlock gate (shown when the DB is encrypted at rest) ───── */
    function UnlockGate({ onUnlocked }) {
      const [pass, setPass] = useState("");
      const [err, setErr] = useState("");
      const [busy, setBusy] = useState(false);
      const submit = async () => {
        if (busy || !pass) return;
        setBusy(true); setErr("");
        const ok = await window.HelaDB.unlock(pass);
        if (ok) onUnlocked(); else { setErr("Incorrect passphrase."); setBusy(false); }
      };
      const wipe = () => { if (confirm("Forget the passphrase and ERASE the encrypted database? This cannot be undone.")) {
        try { localStorage.removeItem("hela.enc.v1"); localStorage.removeItem("hela.db.enc.v1");
              localStorage.removeItem("hela.db.v1"); localStorage.removeItem("hela.sqlite.v1"); } catch(e) {}
        location.reload(); } };
      return (
        <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
          background:"linear-gradient(135deg, var(--bg) 0%, var(--bg-secondary) 100%)",padding:40}}>
          <div className="anim-fade" style={{width:400,background:"var(--surface)",border:"1px solid var(--border)",
            borderRadius:"var(--radius-md)",boxShadow:"var(--shadow-card)",padding:36,textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:6}}>🔐</div>
            <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>Database is encrypted</div>
            <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:22}}>
              Enter the app passphrase to decrypt your local data (AES-256-GCM).
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14,textAlign:"left"}}>
              <Field label="Passphrase" type="password" value={pass} onChange={setPass} placeholder="App passphrase" />
              {err && <div style={{color:"var(--error)",fontSize:12}}>{err}</div>}
              <Button full onClick={submit} style={{height:44}}>{busy?"Decrypting…":"Unlock"}</Button>
            </div>
            <button onClick={wipe} style={{marginTop:18,background:"none",border:"none",cursor:"pointer",
              color:"var(--text-tertiary)",fontSize:12,textDecoration:"underline"}}>Forgot passphrase? Erase database</button>
          </div>
        </div>
      );
    }

    /* Boot sequence: apply saved theme, init the DB engine (SQLite/WASM with
       fallback + optional encryption-at-rest), then mount the app. */
    (function () {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      window.HELA_CONFIG.apply(window.HELA_CONFIG.load());
      root.render(<Boot note="Initializing secure database…" />);
      const mount = () => root.render(<App />);
      window.HelaDB.init()
        .then((res)=>{ window.HELA_ENGINE = res.engine;
          if (res.locked) root.render(<UnlockGate onUnlocked={mount} />); else mount(); })
        .catch((e)=>{ window.HELA_ENGINE = "json"; mount(); });
    })();
  </script>
</body>
</html>
