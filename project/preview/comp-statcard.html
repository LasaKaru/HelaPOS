<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{padding:28px 26px;background:var(--bg-secondary)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:20px;box-shadow:var(--shadow-elevated);flex:1}
  .card.hover{border-color:var(--primary);box-shadow:var(--shadow-floating);transform:translateY(-4px)}
  .badge{display:inline-block;background:var(--success);color:#fff;font-size:11px;font-weight:600;
    border-radius:12px;padding:4px 8px;float:right}
  .v{font-size:28px;font-weight:700;margin-top:4px}
  .k{font-size:13px;color:var(--text-secondary)}</style></head>
<body>
  <div class="row" style="flex-wrap:nowrap">
    <div class="card"><span style="font-size:30px">💰</span><span class="badge">+12%</span>
      <div class="k" style="margin-top:12px">Total Sales</div><div class="v">$4,820.50</div></div>
    <div class="card hover"><span style="font-size:30px">🧾</span>
      <div class="k" style="margin-top:12px">Transactions <span class="muted">· hover state</span></div><div class="v">128</div></div>
  </div>
</body></html>
