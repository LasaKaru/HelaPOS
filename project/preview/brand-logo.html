<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>body{display:flex;align-items:center;gap:30px;padding:20px 28px}
  img{height:78px;width:auto;border-radius:8px}
  .meta .lbl{margin-bottom:6px}
  .swrow{display:flex;gap:10px;margin-top:10px}
  .sw{width:30px;height:30px;border-radius:6px;border:1px solid var(--border)}</style></head>
<body>
  <img src="../assets/helao2-logo.jpg" alt="HelaO2 logo">
  <div class="meta">
    <div class="lbl">Corporate brand mark</div>
    <div style="font-size:13px;color:var(--text-secondary);max-width:300px">"HelaO2" wordmark — ink navy with a heartbeat/pulse glyph. Keep navy; do not recolor to orange.</div>
    <div class="swrow">
      <div class="sw" style="background:#16233F"></div>
      <div class="sw" style="background:#F5F4EF"></div>
      <div class="sw" style="background:var(--primary)"></div>
    </div>
  </div>
</body></html>
