<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .badge{font-size:11px;font-weight:600;color:#fff;border-radius:12px;padding:4px 8px}
  .pill{font-size:13px;font-weight:600;border-radius:16px;padding:8px 16px;cursor:pointer}
  .pill.on{background:var(--primary);color:#fff}
  .pill.off{background:var(--bg-secondary);color:var(--text-secondary)}
</style></head>
<body>
  <div class="lbl">Status badges</div>
  <div class="row" style="margin:8px 0 18px">
    <span class="badge" style="background:var(--success)">✓ Paid</span>
    <span class="badge" style="background:var(--warning)">Low Stock</span>
    <span class="badge" style="background:var(--error)">Out of Stock</span>
    <span class="badge" style="background:var(--info)">New</span>
    <span class="badge" style="background:var(--primary)">↑ 8.4%</span>
  </div>
  <div class="lbl">Pill toggle (segmented)</div>
  <div class="row" style="margin-top:8px">
    <span class="pill on">Day</span><span class="pill off">Week</span><span class="pill off">Month</span>
  </div>
</body></html>
