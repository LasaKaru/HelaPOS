  <style>
    /* ============================================================
       HelaPOS — Colors & Type Foundations
       Source: LasaKaru/POS  (WPF/.NET — Styles/*.xaml)
       ============================================================ */
    :root {
      --font-sans: "Segoe UI", "Source Sans 3", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      --font-mono: "Cascadia Code", "Consolas", ui-monospace, "SF Mono", Menlo, monospace;

      --brand-navy:      #0B1E40;
      --brand-navy-deep: #061227;
      --brand-navy-soft: #13294F;
      --brand-cream:     #F7F9F4;
      --brand-tint:      #E7EBF2;

      --primary:         #0B1E40;
      --primary-hover:   #16294F;
      --primary-pressed: #061227;
      --primary-light:   #E7EBF2;

      --accent-gradient:       linear-gradient(135deg, #1A3160 0%, #0B1E40 100%);
      --accent-gradient-light: linear-gradient(135deg, #E7EBF2 0%, #CDD6E6 100%);

      --legacy-orange:   #D97706;
      --orange-gradient: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);

      --bg:           #FFFFFF;
      --bg-secondary: #F9FAFB;
      --bg-tertiary:  #F3F4F6;
      --surface:      #FFFFFF;
      --border:       #E5E7EB;
      --border-hover: #D1D5DB;

      --text-primary:    #111827;
      --text-secondary:  #6B7280;
      --text-tertiary:   #9CA3AF;
      --text-on-primary: #FFFFFF;

      --success: #10B981; --success-dark: #059669;
      --warning: #F59E0B; --warning-dark: #D97706;
      --error:   #EF4444; --error-dark:   #DC2626;
      --info:    #3B82F6; --info-dark:    #2563EB;

      --success-gradient: linear-gradient(135deg, #10B981 0%, #059669 100%);
      --info-gradient:    linear-gradient(135deg, #3B82F6 0%, #2563EB 100%);
      --danger-gradient:  linear-gradient(135deg, #EF4444 0%, #DC2626 100%);

      --radius-sm:   6px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-pill: 16px;
      --radius-full: 9999px;

      --shadow-card:     0 2px 12px rgba(0,0,0,0.10);
      --shadow-elevated: 0 4px 20px rgba(0,0,0,0.10);
      --shadow-hover:    0 4px 16px rgba(0,0,0,0.15);
      --shadow-floating: 0 8px 24px rgba(0,0,0,0.16);

      --ease-smooth: cubic-bezier(0.215, 0.61, 0.355, 1);
      --ease-quick:  cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --dur-fast:    0.15s;
      --dur-medium:  0.30s;
    }

    [data-theme="dark"] {
      --bg:           #1F2937;
      --bg-secondary: #111827;
      --bg-tertiary:  #0F172A;
      --surface:      #374151;
      --border:       #4B5563;
      --border-hover: #6B7280;
      --text-primary:    #F9FAFB;
      --text-secondary:  #D1D5DB;
      --text-tertiary:   #9CA3AF;
      --text-on-primary: #FFFFFF;
      --shadow-card:     0 4px 16px rgba(0,0,0,0.30);
      --shadow-elevated: 0 4px 20px rgba(0,0,0,0.30);
      --shadow-hover:    0 6px 20px rgba(0,0,0,0.40);
      --shadow-floating: 0 8px 24px rgba(0,0,0,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: var(--font-sans); color: var(--text-primary); background: var(--bg);
           font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    @keyframes helaIndet { 0% { margin-left: -40% } 100% { margin-left: 100% } }
    @keyframes fadeIn    { from { opacity: 0; transform: scale(0.97) } to { opacity: 1; transform: scale(1) } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }

    .anim-fade  { animation: fadeIn  var(--dur-fast) var(--ease-quick) both; }
    .anim-slide { animation: slideUp var(--dur-fast) var(--ease-quick) both; }

    @media print {
      body * { visibility: hidden !important; }
      .receipt-paper, .receipt-paper * { visibility: visible !important; }
      .receipt-paper { position: fixed !important; left: 50%; top: 20px;
                       transform: translateX(-50%); box-shadow: none !important; }
      .no-print { display: none !important; }
    }

  <script>

    window.HELA_CONFIG = (function () {
      const KEY = "hela.config.v1";
      const DEFAULTS = { storeName:"HelaPOS Store", storeTagline:"Point of Sale",
        address:"123 Galle Road, Colombo 03", logo:null, theme:"light", accent:"navy",
        currency:"USD", taxLabel:"VAT", invoicePrefix:"INV", sessionTimeout:15,
        lockMode:"lock",        // "lock" (re-enter password, keep cart) | "logout"
        discountLimit:10,       // max % a cashier may apply before manager approval
        encrypted:false,        // mirror of HelaDB encryption-at-rest flag (for Settings UI)
        taxRate:8,              // % sales tax / VAT
        taxInclusive:false,     // menu prices already include tax?
        serviceCharge:0,        // % service charge (restaurants)
        rounding:"none",        // "none" | "0.05" | "0.50" | "1"
        receiptHeader:"",       // extra line under the store name
        receiptFooter:"Thank you! Please come again.",
        taxId:"",               // tax / VAT registration no. printed on receipts
        autoPromos:true,        // master switch for rule-based automatic promotions
        promoRules:{} };        // { ruleId: false } to disable a specific rule (default on)
      function load()     { try { return {...DEFAULTS,...JSON.parse(localStorage.getItem(KEY)||"{}")}; } catch(e) { return {...DEFAULTS}; } }
      function save(cfg)  { try { localStorage.setItem(KEY,JSON.stringify(cfg)); } catch(e) {} }
      function apply(cfg) {
        document.documentElement.setAttribute("data-theme", cfg.theme);
        const a = window.HELA_ACCENTS[cfg.accent] || window.HELA_ACCENTS.navy;
        const r = document.documentElement.style;
        r.setProperty("--primary", a.primary);
        r.setProperty("--primary-hover", a.hover);
        r.setProperty("--primary-light", a.light);
        r.setProperty("--accent-gradient", a.grad);
        window.HELA_CUR = window.HELA_CURRENCIES[cfg.currency] || window.HELA_CURRENCIES.USD;
      }
      return { DEFAULTS, load, save, apply };
    })();

    /* ===== Role-based access control — roles & granular permissions ===== */
    window.HELA_ROLES = {
      admin:   { name:"Administrator", color:"#0B1E40",

      manager: { name:"Manager",       color:"#0D9488",
                 perms:["sell","tables","orders","inventory","inventory.edit","purchasing","customers","customers.edit",

      cashier: { name:"Cashier",       color:"#1D4ED8",
                 perms:["sell","tables","orders","customers","invoices","discount"] },
    };
    window.HELA_CAN = (role, perm) => {
      const r = window.HELA_ROLES[role]; return !!(r && r.perms.includes(perm));
    };

    window.HELA_PERMS = [

      { key:"customers",       label:"View customers" },

      { key:"inventory.edit",  label:"Add / edit products" },

      { key:"database",        label:"Database admin" },

    // Persisted per-role permission overrides (admin role editor). Applied at load.
    window.HELA_ROLES_STORE = (function () {
      const KEY = "hela.roles.v1";
      function apply() {
        try {
          const o = JSON.parse(localStorage.getItem(KEY) || "null");
          if (o) Object.keys(o).forEach((rk)=>{ if (window.HELA_ROLES[rk]) window.HELA_ROLES[rk].perms = o[rk]; });
        } catch(e) {}
      }
      function save() {
        const o = {}; Object.keys(window.HELA_ROLES).forEach((rk)=>o[rk]=window.HELA_ROLES[rk].perms);
        try { localStorage.setItem(KEY, JSON.stringify(o)); } catch(e) {}
      }
      function setPerm(role, perm, on) {
        const r = window.HELA_ROLES[role]; if (!r) return;
        const set = new Set(r.perms); on ? set.add(perm) : set.delete(perm);
        r.perms = window.HELA_PERMS.map((p)=>p.key).filter((k)=>set.has(k));
        save();
      }
      apply();
      return { apply, save, setPerm };
    })();

    /* ============================================================
       HELA_TOTALS — single source of truth for order maths.
       Honours line discounts, an order-level discount, configurable
       tax rate, tax-inclusive pricing, service charge and rounding.
       Every screen (cart, KOT, payment, receipt, saved bill) uses it
       so the numbers always agree.
       ============================================================ */
    window.HELA_TOTALS = function (items, cfg, promo) {
      cfg = cfg || window.HELA_CONFIG.load();
      const r2 = (n) => Math.round(n * 100) / 100;
      const rate = (cfg.taxRate != null ? cfg.taxRate : 8) / 100;
      const svcR = (cfg.serviceCharge || 0) / 100;
      const inclusive = !!cfg.taxInclusive;
      const gross = items.reduce((s, i) => s + i.price * i.qty, 0);
      const lineDisc = items.reduce((s, i) => s + i.price * i.qty * (i.discount || 0) / 100, 0);
      const afterLine = gross - lineDisc;
      // promo: a number (= percent, back-compat) or { type:'pct'|'amt', value }
      let orderDisc = 0;
      if (typeof promo === "number") orderDisc = afterLine * (promo / 100);
      else if (promo && promo.type === "pct") orderDisc = afterLine * (promo.value / 100);
      else if (promo && promo.type === "amt") orderDisc = Math.min(promo.value, afterLine);
      orderDisc = Math.max(0, Math.min(orderDisc, afterLine));
      const net = afterLine - orderDisc;            // taxable base (excl. tax if exclusive)
      const service = net * svcR;
      let subtotal, tax, total;
      if (inclusive) {
        const grossTaxed = net + service;           // already includes tax
        tax = grossTaxed - grossTaxed / (1 + rate);
        subtotal = net - (net - net / (1 + rate));  // net excl. tax portion (display)
        total = grossTaxed;
      } else {
        subtotal = net;
        tax = (net + service) * rate;
        total = net + service + tax;
      }
      // rounding to the configured cash increment
      const inc = cfg.rounding === "1" ? 1 : cfg.rounding === "0.50" ? 0.5 : cfg.rounding === "0.05" ? 0.05 : 0;
      const rounded = inc ? Math.round(total / inc) * inc : total;
      const roundingAdj = r2(rounded - total);
      return {
        gross: r2(gross), discount: r2(lineDisc + orderDisc), lineDiscount: r2(lineDisc),
        orderDiscount: r2(orderDisc), subtotal: r2(subtotal), service: r2(service),
        tax: r2(tax), taxRate: cfg.taxRate != null ? cfg.taxRate : 8, inclusive,
        roundingAdj, total: r2(rounded),
      };
    };

    /* ============================================================
       HelaDB — a tiny SQLite-style persistence layer.
       A single JSON document in localStorage acts as the database
       file; each array property is a "table" with CRUD + an
       auto-increment id and named counters. Mirrors how the WPF
       app would talk to SQLite (tables: users, products, customers,
       bills, stock, counters). Supports export/import (SQL dump
       equivalent) and reset (drop & recreate).
       ============================================================ */
    /* ============================================================
       HelaCrypto — password hashing with the Web Crypto API.
       PBKDF2 (SHA-256, 120k iterations) + a per-user random salt.
       Passwords are NEVER stored in plaintext. Falls back to a
       salted SHA-256 (or a last-resort salted digest) when a
       secure context / SubtleCrypto isn't available.
       ============================================================ */
    window.HelaCrypto = (function () {
      const enc = new TextEncoder();
      const subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;
      const toHex = (buf) => Array.from(new Uint8Array(buf)).map((b)=>b.toString(16).padStart(2,"0")).join("");
      const fromHex = (hex) => { const a=new Uint8Array(hex.length/2); for(let i=0;i<a.length;i++) a[i]=parseInt(hex.substr(i*2,2),16); return a; };
      function randSalt() {
        const a = new Uint8Array(16);
        (window.crypto && window.crypto.getRandomValues) ? window.crypto.getRandomValues(a)
          : a.forEach((_,i)=>a[i]=Math.floor(Math.random()*256));
        return toHex(a);
      }
      // weak but salted fallback (only if SubtleCrypto missing)
      function weak(pw, salt) { let h=5381; const s=salt+"::"+pw; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))>>>0;
        let out=""+h; for(let r=0;r<3;r++){ let g=h; for(let i=0;i<out.length;i++) g=((g<<5)+g+out.charCodeAt(i))>>>0; out+=(""+g); } return "w$"+out; }
      async function derive(pw, saltHex) {
        if (!subtle) return weak(pw, saltHex);
        const key  = await subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveBits"]);
        const bits = await subtle.deriveBits({ name:"PBKDF2", salt:fromHex(saltHex), iterations:120000, hash:"SHA-256" }, key, 256);
        return "p$" + toHex(bits);
      }
      async function hash(pw)            { const salt=randSalt(); return { salt, hash:await derive(pw,salt) }; }
      async function verify(pw,salt,h)   { if(!salt||!h) return false; const d=await derive(pw,salt);
        // constant-time-ish compare
        if (d.length!==h.length) return false; let diff=0; for(let i=0;i<d.length;i++) diff|=d.charCodeAt(i)^h.charCodeAt(i); return diff===0; }

      // ---- AES-256-GCM encryption-at-rest (key derived from an app passphrase) ----
      async function aesKey(passphrase, saltHex) {
        const base = await subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
        return subtle.deriveKey({ name:"PBKDF2", salt:fromHex(saltHex), iterations:150000, hash:"SHA-256" },
          base, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]);
      }
      async function encrypt(plaintext, passphrase) {
        if (!subtle) throw new Error("Encryption requires a secure context (https/localhost).");
        const salt = randSalt();
        const iv = new Uint8Array(12); window.crypto.getRandomValues(iv);
        const key = await aesKey(passphrase, salt);
        const ct = await subtle.encrypt({ name:"AES-GCM", iv }, key, enc.encode(plaintext));
        return JSON.stringify({ v:1, alg:"AES-GCM", salt, iv:toHex(iv), ct:toHex(new Uint8Array(ct)) });
      }
      async function decrypt(blobStr, passphrase) {
        if (!subtle) throw new Error("Encryption requires a secure context.");
        const b = JSON.parse(blobStr);
        const key = await aesKey(passphrase, b.salt);
        const pt = await subtle.decrypt({ name:"AES-GCM", iv:fromHex(b.iv) }, key, fromHex(b.ct));
        return new TextDecoder().decode(pt);
      }

      // ---- Password policy (used by login-set, change-password, user form) ----
      function policy(pw) {
        const checks = {
          length:  (pw||"").length >= 8,
          upper:   /[A-Z]/.test(pw||""),
          lower:   /[a-z]/.test(pw||""),
          digit:   /[0-9]/.test(pw||""),
        };
        const score = Object.values(checks).filter(Boolean).length + (/[^A-Za-z0-9]/.test(pw||"")?1:0);
        const ok = checks.length && checks.upper && checks.lower && checks.digit;
        return { checks, score, ok, label: ["Very weak","Weak","Fair","Good","Strong","Very strong"][Math.min(score,5)] };
      }

      return { hash, verify, encrypt, decrypt, policy, secure: !!subtle };
    })();

    /* ============================================================
       HelaDB — persistence with a REAL SQLite backend (sql.js / WASM)
       and a localStorage fallback. An in-memory mirror (`mem`) is the
       synchronous source of truth for the UI; every mutation is also
       written to SQLite via *parameterised* statements (injection-safe)
       and the SQLite binary is snapshotted to localStorage. Export
       produces an actual .sqlite file. Boot is async (init()).
       ============================================================ */
    window.HelaDB = (function () {
      const SNAP_KEY   = "hela.db.v1";       // JSON mirror snapshot
      const SQLITE_KEY = "hela.sqlite.v1";   // base64 of the SQLite file
      const DOC_TABLES = ["users","products","customers","bills","logs","shifts","suppliers","purchases","tabs"];
      let engine = "json";      // "sqlite" | "json"
      let SQL = null, sdb = null;
      let mem = null;            // tables: users, products, customers, bills, logs, shifts, suppliers, purchases, counters

      async function freshSeed() {
        const mk = async (username, pw, name, role, created) => {
          const { salt, hash } = await window.HelaCrypto.hash(pw);
          return { username, name, role, created, active:true, salt, hash, failed:0, lockUntil:0 };
        };
        const users = [
          { id:1, ...(await mk("admin",   "admin123",   "Admin User",    "admin",   "2025-01-01")) },
          { id:2, ...(await mk("manager", "manager123", "Store Manager", "manager", "2025-02-12")) },
          { id:3, ...(await mk("cashier", "cashier123", "Front Cashier", "cashier", "2025-03-04")) },
        ];
        return {
          users,
          // seed a sensible cost (≈40% of price) so profit reporting works out of the box
          products:  window.HELA_DATA.products.map((p)=>({ ...p, cost: p.cost!=null?p.cost:Math.round(p.price*0.4*100)/100 })),
          customers: window.HELA_CUSTOMERS_SEED.map((c)=>({ ...c })),
          bills:     [],
          logs:      [{ id:1, ts:Date.now(), user:"system", role:"system", action:"db_init", detail:"Database created" }],
          shifts:    [],
          suppliers: [
            { id:1, name:"Fresh Farms Ltd",     phone:"+94 11 234 5678", email:"sales@freshfarms.lk", terms:"Net 30" },
            { id:2, name:"Ocean Catch Seafood", phone:"+94 11 765 4321", email:"orders@oceancatch.lk", terms:"COD" },
            { id:3, name:"Metro Beverages",     phone:"+94 11 998 1122", email:"hello@metrobev.lk",   terms:"Net 15" },
          ],
          purchases: [],
          tabs:      (function(){
            const prod=(id)=>window.HELA_DATA.products.find((p)=>p.id===id);
            const sline=(id,qty)=>{ const p=prod(id); return { id:p.id, name:p.name, cat:p.cat, icon:p.icon, tile:p.tile,
              basePrice:p.price, price:p.price, cost:p.cost!=null?p.cost:Math.round(p.price*0.4*100)/100,
              qty, discount:0, note:"", mods:[], sig:p.id+"##seed", line:"seed-"+id+"-"+Math.random().toString(36).slice(2,7) }; };
            const now=new Date();
            const stamp=now.toLocaleString("en-GB");
            return [
              { id:1, table:"T2", type:"Dine in", guests:4, customer:null, promo:null, status:"open",
                openedBy:"Admin User",    openedById:1, openedAt:stamp, openedTs:now.getTime()-38*60000,
                items:[ sline(21,1), sline(24,1), sline(29,2) ] },
              { id:2, table:"T6", type:"Dine in", guests:2, customer:null, promo:null, status:"open",
                openedBy:"Front Cashier", openedById:3, openedAt:stamp, openedTs:now.getTime()-12*60000,
                items:[ sline(15,2), sline(13,1) ] },
            ];
          })(),
          counters:  { bill:483, invoice:1024, po:1001 },
        };
      }

      const b64 = {
        enc: (u8) => { let s=""; for(let i=0;i<u8.length;i++) s+=String.fromCharCode(u8[i]); return btoa(s); },
        dec: (str) => { const s=atob(str); const u8=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u8[i]=s.charCodeAt(i); return u8; },
      };
      const ENC_FLAG = "hela.enc.v1";        // "1" when encryption-at-rest is on
      const ENC_KEY  = "hela.db.enc.v1";     // AES-GCM encrypted JSON snapshot
      let encrypted = false, passphrase = null, locked = false;

      const saveSnap   = () => { try { localStorage.setItem(SNAP_KEY, JSON.stringify(mem)); } catch(e) {} };
      const saveSqlite = () => { if(!sdb) return; try { localStorage.setItem(SQLITE_KEY, b64.enc(sdb.export())); } catch(e) {} };
      async function doPersist() {
        if (encrypted && passphrase) {
          try {
            const blob = await window.HelaCrypto.encrypt(JSON.stringify(mem), passphrase);
            localStorage.setItem(ENC_KEY, blob);
            localStorage.removeItem(SNAP_KEY); localStorage.removeItem(SQLITE_KEY);
          } catch(e) {}
        } else {
          saveSnap(); if (engine==="sqlite") saveSqlite();
        }
      }
      // Serialize persists so concurrent async (encrypted) writes can't race; each
      // run reads the latest `mem` at execution time, so the final state is consistent.
      let persistChain = Promise.resolve();
      function persist() { persistChain = persistChain.then(doPersist, doPersist); return persistChain; }

      // ---- SQLite schema + mirror sync (parameterised) ----
      function migrate() {
        DOC_TABLES.forEach((t)=>sdb.run("CREATE TABLE IF NOT EXISTS "+t+" (id INTEGER PRIMARY KEY, doc TEXT)"));
        sdb.run("CREATE TABLE IF NOT EXISTS counters (name TEXT PRIMARY KEY, value INTEGER)");
      }
      function sqlReplace(t, row) { sdb.run("INSERT OR REPLACE INTO "+t+" (id, doc) VALUES (?, ?)", [row.id, JSON.stringify(row)]); }
      function sqlDelete(t, id)   { sdb.run("DELETE FROM "+t+" WHERE id = ?", [id]); }
      function sqlCounter(n, v)   { sdb.run("INSERT OR REPLACE INTO counters (name, value) VALUES (?, ?)", [n, v]); }
      function rebuildSqliteFromMem() {
        DOC_TABLES.forEach((t)=>{ sdb.run("DELETE FROM "+t); (mem[t]||[]).forEach((r)=>sqlReplace(t,r)); });
        sdb.run("DELETE FROM counters");
        Object.keys(mem.counters||{}).forEach((n)=>sqlCounter(n, mem.counters[n]));
      }
      function memFromSqlite() {
        const out = { counters:{} };
        DOC_TABLES.forEach((t)=>{ out[t]=[]; const res=sdb.exec("SELECT doc FROM "+t+" ORDER BY id");
          if(res[0]) res[0].values.forEach((v)=>{ try{ out[t].push(JSON.parse(v[0])); }catch(e){} }); });
        const c = sdb.exec("SELECT name, value FROM counters");
        if(c[0]) c[0].values.forEach((v)=>out.counters[v[0]]=v[1]);
        return out;
      }
      const ensureTables = () => DOC_TABLES.concat(["counters"]).forEach((k)=>{ if(mem[k]===undefined) mem[k]=k==="counters"?{bill:483,invoice:1024}:[]; });
      // mem is authoritative; (re)build a fresh in-memory SQLite mirror from it.
      function attachSqlite() {
        if (SQL) { try { sdb = new SQL.Database(); migrate(); rebuildSqliteFromMem(); engine="sqlite"; return; } catch(e) {} }
        sdb = null; engine = "json";
      }

      // Upgrade any legacy plaintext-password users to salted hashes so older
      // saved databases keep working (and never store plaintext going forward).
      async function migrateUsers(users) {
        for (const u of users) {
          if (!u.hash) {
            const pw = u.password || (u.username + "123");
            const { salt, hash } = await window.HelaCrypto.hash(pw);
            u.salt = salt; u.hash = hash; u.failed = u.failed||0; u.lockUntil = u.lockUntil||0;
            delete u.password;
          }
        }
      }
      async function finishLoad() { ensureTables(); await migrateUsers(mem.users); attachSqlite(); await persist(); }

      async function init() {
        if (window.initSqlJs) {
          try { SQL = await window.initSqlJs({ locateFile:(f)=>"https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/"+f }); }
          catch(e) { SQL = null; }
        }
        encrypted = localStorage.getItem(ENC_FLAG) === "1";
        if (encrypted && localStorage.getItem(ENC_KEY)) {   // DB is sealed — needs a passphrase
          locked = true; engine = SQL ? "sqlite" : "json";
          return { engine, locked:true };
        }
        try { mem = JSON.parse(localStorage.getItem(SNAP_KEY)) || null; } catch(e) { mem=null; }
        if (!mem) mem = await freshSeed();
        await finishLoad();
        return { engine, locked:false };
      }
      async function unlock(pass) {
        const blob = localStorage.getItem(ENC_KEY);
        if (!blob) return false;
        let txt; try { txt = await window.HelaCrypto.decrypt(blob, pass); } catch(e) { return false; }
        try { mem = JSON.parse(txt); } catch(e) { return false; }
        passphrase = pass; encrypted = true; locked = false;
        await finishLoad();
        return true;
      }
      async function enableEncryption(pass) {
        if (!window.HelaCrypto.secure) throw new Error("Encryption needs a secure context.");
        if (!pass || pass.length < 6) throw new Error("Passphrase must be at least 6 characters.");
        passphrase = pass; encrypted = true; localStorage.setItem(ENC_FLAG, "1");
        await persist(); return true;
      }
      async function disableEncryption() {
        encrypted = false; passphrase = null;
        localStorage.removeItem(ENC_FLAG); localStorage.removeItem(ENC_KEY);
        await persist(); return true;
      }

      const nextId  = (t) => Math.max(0, ...(mem[t]||[]).map((r)=>r.id||0)) + 1;
      const all     = (t) => (mem[t]||[]).slice();
      const get     = (t,id) => (mem[t]||[]).find((r)=>r.id===id);
      const insert  = (t,row) => { const id = row.id!=null?row.id:nextId(t); const r={...row,id};
                                   mem[t]=[...(mem[t]||[]),r]; if(engine==="sqlite") sqlReplace(t,r); persist(); return r; };
      const update  = (t,id,patch) => { let upd=null; mem[t]=(mem[t]||[]).map((r)=>{ if(r.id===id){ upd={...r,...patch}; return upd; } return r; });
                                   if(upd&&engine==="sqlite") sqlReplace(t,upd); persist(); return upd; };
      const remove  = (t,id) => { mem[t]=(mem[t]||[]).filter((r)=>r.id!==id); if(engine==="sqlite") sqlDelete(t,id); persist(); };
      const counter = (name) => { mem.counters=mem.counters||{}; const v=mem.counters[name]||1; mem.counters[name]=v+1;
                                   if(engine==="sqlite") sqlCounter(name, mem.counters[name]); persist(); return v; };
      const log     = (entry) => insert("logs", { ts:Date.now(), ...entry });
      const stats   = () => DOC_TABLES.map((t)=>({ table:t, rows:(mem[t]||[]).length }))
                              .concat([{ table:"counters", rows:Object.keys(mem.counters||{}).length }]);
      const query   = (sql) => {   // read-only SQL console (SQLite engine only)
        if (engine!=="sqlite") throw new Error("SQL console requires the SQLite engine.");
        const s = (sql||"").trim().toLowerCase();
        if (!(s.startsWith("select") || s.startsWith("pragma"))) throw new Error("Only SELECT / PRAGMA queries are allowed.");
        return sdb.exec(sql);
      };
      const exportJSON   = () => JSON.stringify(mem, null, 2);
      const exportSqlite = () => sdb ? sdb.export() : null;
      const importJSON   = (str) => { mem = JSON.parse(str); ensureTables();
        if(engine==="sqlite") rebuildSqliteFromMem(); persist(); };
      const importSqlite = (u8) => { if(!SQL) throw new Error("SQLite engine unavailable.");
        sdb = new SQL.Database(u8); migrate(); mem = memFromSqlite(); ensureTables(); persist(); };
      const reset        = async () => { mem = await freshSeed(); if(engine==="sqlite") rebuildSqliteFromMem(); await persist(); };

      return { init, unlock, enableEncryption, disableEncryption,
               all, get, insert, update, remove, counter, log, stats, query,
               exportJSON, exportSqlite, importJSON, importSqlite, reset,
               engineName:()=>engine, isSecure:()=>window.HelaCrypto.secure,
               isEncrypted:()=>encrypted, needsUnlock:()=>locked };
    })();

    /* ============================================================
       HelaSession — token session with inactivity expiry.
       Persisted so a refresh keeps you signed in until it expires.
       ============================================================ */
    window.HelaSession = (function () {
      const KEY = "hela.session.v1";
      const timeoutMs = () => (window.HELA_CONFIG.load().sessionTimeout || 15) * 60000;
      const token = () => (window.crypto && crypto.getRandomValues)
        ? Array.from(crypto.getRandomValues(new Uint8Array(16))).map((b)=>b.toString(16).padStart(2,"0")).join("")
        : Math.random().toString(36).slice(2);
      const save  = (s) => { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} };
      const get   = () => { try { return JSON.parse(localStorage.getItem(KEY)); } catch(e) { return null; } };
      const clear = () => { try { localStorage.removeItem(KEY); } catch(e) {} };
      const create = (u) => { const now=Date.now();
        const s = { userId:u.id, role:u.role, name:u.name, username:u.username,
                    token:token(), issued:now, last:now, expires:now+timeoutMs() }; save(s); return s; };
      const valid = () => { const s=get(); return !!(s && s.expires>Date.now()); };
      const touch = () => { const s=get(); if(s){ const now=Date.now(); s.last=now; s.expires=now+timeoutMs(); save(s); } };
      const remaining = () => { const s=get(); return s ? Math.max(0, s.expires-Date.now()) : 0; };
      return { create, get, valid, touch, clear, remaining, timeoutMs };
    })();

    /* ============================================================
       HelaAuth — secure login: hashed verification, lockout, audit.
       ============================================================ */
    window.HelaAuth = {
      async login(username, password) {
        const uname = (username||"").trim().toLowerCase();
        const u = window.HelaDB.all("users").find((x)=>x.username===uname);
        const now = Date.now();
        if (!u)               return { ok:false, error:"Invalid username or password." };
        if (u.active===false) { window.HelaDB.log({ user:uname, role:u.role, action:"login_blocked", detail:"account disabled" });
                                return { ok:false, error:"This account is disabled." }; }
        if (u.lockUntil && u.lockUntil>now)
          return { ok:false, error:"Account locked. Try again in "+Math.ceil((u.lockUntil-now)/1000)+"s." };
        const ok = await window.HelaCrypto.verify(password, u.salt, u.hash);
        if (!ok) {
          const failed = (u.failed||0)+1;
          const patch  = failed>=5 ? { failed:0, lockUntil:now+30000 } : { failed };
          window.HelaDB.update("users", u.id, patch);
          window.HelaDB.log({ user:uname, role:u.role, action:"login_failed", detail:"attempt "+failed });
          return { ok:false, error: patch.lockUntil ? "Too many attempts — locked for 30s." : "Invalid username or password." };
        }
        window.HelaDB.update("users", u.id, { failed:0, lockUntil:0 });
        const session = window.HelaSession.create(u);
        window.HelaDB.log({ user:uname, role:u.role, action:"login", detail:(window.HELA_ROLES[u.role]||{}).name||u.role });
        return { ok:true, user:{ id:u.id, name:u.name, username:u.username, role:u.role }, session };
      },
      logout(user, reason) {
        if (user) window.HelaDB.log({ user:user.username, role:user.role, action:"logout", detail:reason||"manual" });
        window.HelaSession.clear();
      },
      // Verify a manager/admin credential to authorize a privileged action (does NOT start a session).
      async verifyManager(username, password) {
        const u = window.HelaDB.all("users").find((x)=>x.username===(username||"").trim().toLowerCase());
        if (!u || u.active===false) return { ok:false, error:"Unknown or disabled account." };
        if (!(u.role==="manager" || u.role==="admin")) return { ok:false, error:"That account can't authorize this." };
        const ok = await window.HelaCrypto.verify(password, u.salt, u.hash);
        return ok ? { ok:true, user:{ id:u.id, name:u.name, username:u.username, role:u.role } }
                  : { ok:false, error:"Invalid password." };
      },
    };
  </script>

  <!-- ── Components ─────────────────────────────────────────── -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ───── Primitives ───── */
    function Button({ variant="primary", children, onClick, disabled, style, full }) {
      const [press, setPress] = useState(false);
      const [hover, setHover] = useState(false);
      const base = {
        fontFamily:"var(--font-sans)", fontSize:14, fontWeight:600,
        borderRadius:"var(--radius-sm)", padding:"12px 24px",
        cursor: disabled ? "not-allowed" : "pointer",
        border:"1px solid transparent",
        transition:"background-color var(--dur-fast) var(--ease-quick), border-color var(--dur-fast) var(--ease-quick), transform var(--dur-fast) var(--ease-quick)",
        transform: press ? "scale(0.98)" : "scale(1)",
        width: full ? "100%" : "auto",
        opacity: disabled ? 0.5 : 1, ...style,
      };
      const variants = {
        primary:   { background:"var(--primary)", color:"#fff" },
        secondary: { background:"var(--bg-secondary)", color:"var(--text-primary)", borderColor:"var(--border)" },
        ghost:     { background:"transparent", color:"var(--text-secondary)" },
      };
      const hov = {
        primary:   { background:"var(--primary-hover)" },
        secondary: { background:"var(--bg-tertiary)", borderColor:"var(--border-hover)" },
        ghost:     { background:"var(--bg-secondary)", color:"var(--primary)" },
      };
      return (
        <button style={{...base,...variants[variant],...(hover&&!disabled?hov[variant]:{})}}
          onClick={disabled?undefined:onClick}
          onMouseEnter={()=>setHover(true)} onMouseLeave={()=>{setHover(false);setPress(false);}}
          onMouseDown={()=>setPress(true)} onMouseUp={()=>setPress(false)}>
          {children}
        </button>
      );
    }

    function Card({ children, style, lift, onClick }) {
      const [h, setH] = useState(false);
      const active = lift && h;
      return (
        <div onClick={onClick}
          onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
          style={{
            background:"var(--surface)", border:"1px solid "+(active?"var(--primary)":"var(--border)"),
            borderRadius:"var(--radius-lg)", padding:20,
            boxShadow: active?"var(--shadow-floating)":"var(--shadow-elevated)",
            transform: active?"translateY(-4px)":"none",
            transition:"all var(--dur-fast) var(--ease-quick)",
            cursor: onClick?"pointer":"default", ...style,
          }}>{children}</div>
      );
    }

    function Field({ label, type="text", value, onChange, placeholder, fontSize=14, required }) {
      const [focus, setFocus] = useState(false);

                            </div>
                          </label>
                          <label style={{flex:1,fontSize:12,color:"var(--text-secondary)"}}>Discount(%)
                            <input value={i.discount||0}
                              onChange={(e)=>{
                                const v = Math.min(100,Math.max(0,parseInt(e.target.value)||0));
                                if (!freeDiscount && v>discountLimit && requireManager) {
                                  requireManager("Discount above "+discountLimit+"%", ()=>patch(key,"discount",v));
                                } else patch(key,"discount",v);
                              }}
                              style={{...inpStyle,width:"100%",marginTop:5}} />
                            {!freeDiscount && <span style={{fontSize:10,color:"var(--text-tertiary)"}}>max {discountLimit}% (mgr above)</span>}
                          </label>
                        </div>
                        <label style={{display:"block",fontSize:12,color:"var(--text-secondary)",marginTop:10}}>Note
                          <input value={i.note||""} onChange={(e)=>patch(key,"note",e.target.value)}
                            placeholder="e.g. no chilli, extra sauce"
                            style={{...inpStyle,width:"100%",marginTop:5,textAlign:"left"}} />
                        </label>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Add row */}
            <div style={{display:"flex",gap:18,padding:"11px 18px",background:"var(--primary-light)",fontSize:13,fontWeight:600,position:"relative"}}>
              <span style={{color:"var(--text-secondary)"}}>Add</span>
              <span onClick={()=>{ if(cart.length&&open==null&&cart[0]) setOpen(cart[0].line!=null?cart[0].line:cart[0].id); }} style={{color:"var(--primary)",cursor:"pointer"}}>Discount</span>
              <span onClick={()=>{ setCouponErr(""); setCouponOpen((v)=>!v); }} style={{color:"var(--primary)",cursor:"pointer"}}>Coupon Code</span>
              <span onClick={()=>{ if(cart.length&&cart[0]) setOpen(cart[0].line!=null?cart[0].line:cart[0].id); }} style={{color:"var(--primary)",cursor:"pointer"}}>Note</span>
              {couponOpen && (
                <div style={{position:"absolute",bottom:42,left:18,right:18,background:"var(--surface)",border:"1px solid var(--border)",
                  borderRadius:10,boxShadow:"var(--shadow-floating)",padding:12,zIndex:30}}>
                  <div style={{display:"flex",gap:8}}>
                    <input value={couponInput} onChange={(e)=>setCouponInput(e.target.value)} placeholder="e.g. SAVE10"
                      style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text-primary)",fontFamily:"var(--font-sans)",fontSize:13,outline:"none",textTransform:"uppercase"}} />
                    <button onClick={applyCoupon} style={{background:"var(--primary)",color:"#fff",border:"none",borderRadius:8,padding:"0 14px",cursor:"pointer",fontWeight:700,fontFamily:"var(--font-sans)"}}>Apply</button>
                  </div>
                  {couponErr && <div style={{color:"var(--error)",fontSize:11,marginTop:6}}>{couponErr}</div>}
                  <div style={{fontSize:10,color:"var(--text-tertiary)",marginTop:6,fontWeight:400}}>Try: SAVE10, WELCOME5, VIP20, LUNCH15</div>
                </div>
              )}
            </div>

            {/* Totals */}
            <div style={{padding:"14px 18px",borderTop:"1px solid var(--border)"}}>
              <Tot k="Subtotal" v={fmt(T.subtotal)} />
              {promo ? (
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
                  <span style={{fontSize:13,color:"var(--success)"}}>🎟 {promo.code}
                    <span onClick={()=>setPromo(null)} style={{color:"var(--text-tertiary)",cursor:"pointer",marginLeft:6}}>✕</span></span>
                  <span style={{fontSize:13,fontWeight:600,color:"var(--success)"}}>{"– "+fmt(T.orderDiscount)}</span>
                </div>
              ) : autoPromo ? (
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"center"}}>
                  <span style={{fontSize:13,color:"var(--success)"}}>✨ {autoPromo.label}
                    <span style={{fontSize:9,fontWeight:700,color:"var(--primary)",background:"var(--primary-light)",borderRadius:6,padding:"1px 5px",marginLeft:6}}>AUTO</span></span>
                  <span style={{fontSize:13,fontWeight:600,color:"var(--success)"}}>{"– "+fmt(T.orderDiscount)}</span>
                </div>
              ) : null}
              {T.discount>0&&<Tot k="Discount (total)" v={"– "+fmt(T.discount)} tone="success" />}
              {T.service>0&&<Tot k={"Service ("+(cfg&&cfg.serviceCharge||0)+"%)"} v={fmt(T.service)} />}
              <Tot k={(cfg&&cfg.taxLabel||"Tax")+" ("+T.taxRate+"%"+(T.inclusive?" incl":"")+")"} v={fmt(T.tax)} />
              {T.roundingAdj!==0&&<Tot k="Rounding" v={(T.roundingAdj>0?"+":"")+fmt(T.roundingAdj)} />}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                <span style={{fontSize:15,fontWeight:700}}>Payable Amount</span>
                <span style={{fontSize:18,fontWeight:800,color:"var(--primary)"}}>{fmt(payable)}</span>
              </div>
            </div>

            {/* Actions */}
            <div style={{display:"flex",gap:10,padding:"0 18px 10px"}}>
              <button disabled={!cart.length} onClick={onHold}
                style={{...actBtn,flex:1,background:"var(--bg-secondary)",color:"var(--text-primary)",
                  border:"1px solid var(--border)",opacity:cart.length?1:.5}}>
                ⏸ Hold
              </button>
              <button disabled={!cart.length} onClick={onVoid}
                style={{...actBtn,flex:1,background:"var(--bg-secondary)",color:"var(--error)",
                  border:"1px solid var(--border)",opacity:cart.length?1:.5}}>
                🗑 Void
              </button>
            </div>
            {table && (
              <div style={{padding:"0 18px 10px"}}>
                <button disabled={!cart.length} onClick={onSaveTab}
                  style={{...actBtn,width:"100%",background:"var(--primary-light)",color:"var(--primary)",
                    border:"1px solid var(--primary)",opacity:cart.length?1:.5}}>
                  💾 Save {table} & keep open
                </button>
              </div>
            )}
            <div style={{display:"flex",gap:10,padding:"0 18px 18px"}}>
              <button disabled={!cart.length} onClick={onSplit}
                style={{...actBtn,flex:"0 0 34%",background:"var(--bg-secondary)",color:"var(--text-primary)",
                  border:"1px solid var(--border)",opacity:cart.length?1:.5}}>
                🔀 Split
              </button>
              <button disabled={!cart.length} onClick={()=>onProceed(payable)}
                style={{...actBtn,flex:1,background:"var(--success)",color:"#fff",opacity:cart.length?1:.5}}>
                ✓ Proceed to Pay
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ───── Payment modal ───── */
    function PaymentModal({ total, customer, onClose, onComplete, caption }) {
      const fmt = window.HELA_DATA.fmt;
      // Fresh store-credit balance for the order's customer (if any).
      const credit = customer ? ((window.HelaDB.get("customers", customer.id)||customer).credit||0) : 0;
      const hasCredit = credit > 0;
      const [method, setMethod] = useState("Cash");
      const [tendered, setTendered] = useState("");
      const [done, setDone] = useState(false);
      const [tenders, setTenders] = useState([]);          // split payment lines
      const [splitMethod, setSplitMethod] = useState("Cash");
      const [splitAmt, setSplitAmt] = useState("");
      const t = parseFloat(tendered)||0;
      const paidSplit = tenders.reduce((s,x)=>s+x.amount,0);
      const remaining = Math.max(0, Math.round((total-paidSplit)*100)/100);
      const change = method==="Mixed" ? Math.max(0, Math.round((paidSplit-total)*100)/100) : Math.max(0,t-total);
      // credit already committed in the split, and how much is still available
      const splitCreditUsed = tenders.filter((x)=>x.method==="Credit").reduce((s,x)=>s+x.amount,0);
      const creditAvail = Math.max(0, Math.round((credit-splitCreditUsed)*100)/100);
      const creditUsed = method==="Credit" ? Math.min(total,credit) : method==="Mixed" ? splitCreditUsed : 0;
      const canComplete = method==="Cash" ? Math.round(t*100)>=Math.round(total*100)
        : method==="Mixed" ? Math.round(paidSplit*100)>=Math.round(total*100)
        : method==="Credit" ? Math.round(credit*100)>=Math.round(total*100) : true;
      const methods = [["Cash","💵"],["Card","💳"],["Mobile","📱"],["Mixed","🔀"]].concat(hasCredit?[["Credit","🎁"]]:[]);
      const splitMethods = ["Cash","Card","Mobile"].concat(hasCredit?["Credit"]:[]);
      const addTender = () => { let a=parseFloat(splitAmt)|| remaining;
        if (splitMethod==="Credit") a = Math.min(a, creditAvail, remaining);
        if(a<=0) return;
        setTenders((x)=>[...x,{method:splitMethod,amount:Math.round(a*100)/100}]); setSplitAmt(""); };
      const complete = ()=>{ setDone(true);
        const payload = method==="Mixed" ? { method:"Mixed", tenders, change, creditUsed }
          : method==="Credit" ? { method:"Credit", tendered:total, change:0, creditUsed }
          : { method, tendered:t, change };
        setTimeout(()=>onComplete(payload),1000); };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",
          alignItems:"center",justifyContent:"center",zIndex:50}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
            style={{width:860,maxWidth:"94vw",height:600,maxHeight:"92vh",background:"var(--bg)",
              borderRadius:"var(--radius-lg)",overflow:"hidden",display:"grid",
              gridTemplateColumns:"1fr 320px",boxShadow:"var(--shadow-floating)"}}>
            {done ? (
              <div style={{gridColumn:"1 / -1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
                <div style={{width:88,height:88,borderRadius:"50%",background:"var(--success-gradient)",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>✓</div>
                <div style={{fontSize:26,fontWeight:700}}>Payment Complete</div>
                <div style={{color:"var(--text-secondary)"}}>Receipt RCP-00483 · {fmt(total)}</div>
                {method==="Cash"&&change>0&&<div style={{color:"var(--success)",fontWeight:600}}>Change due {fmt(change)}</div>}
              </div>
            ) : (
              <React.Fragment>
                <div style={{display:"flex",flexDirection:"column",minHeight:0}}>
                  <div style={{padding:"20px 30px",borderBottom:"1px solid var(--border)",background:"var(--surface)",
                    display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontSize:22,fontWeight:700}}>Process Payment</div>
                      <div style={{fontSize:13,color:caption?"var(--primary)":"var(--text-secondary)",marginTop:2,fontWeight:caption?700:400}}>
                        {caption || "Select method and enter details"}</div>
                    </div>
                    <div style={{background:"var(--primary)",color:"#fff",borderRadius:8,padding:"8px 16px",textAlign:"center"}}>
                      <div style={{fontSize:11}}>Amount Due</div>
                      <div style={{fontSize:26,fontWeight:700}}>{fmt(total)}</div>
                    </div>
                  </div>
                  <div style={{padding:"20px 30px",overflow:"auto",flex:1}}>
                    <div style={{fontSize:13,color:"var(--text-secondary)",marginBottom:10,display:"flex",justifyContent:"space-between"}}>
                      <span>Payment Method *</span>
                      {hasCredit && <span style={{color:"var(--primary)",fontWeight:600}}>🎁 {customer.name}: {fmt(credit)} credit</span>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat("+methods.length+",1fr)",gap:10,marginBottom:22}}>
                      {methods.map(([m,ic])=>(
                        <button key={m} onClick={()=>setMethod(m)} style={{padding:"14px 6px",borderRadius:8,cursor:"pointer",
                          fontFamily:"var(--font-sans)",fontSize:13,fontWeight:600,textAlign:"center",
                          border:"1px solid "+(method===m?"var(--primary)":"var(--border)"),
                          background:method===m?"var(--primary-light)":"var(--surface)",color:"var(--text-primary)"}}>
                          <div style={{fontSize:22}}>{ic}</div>{m}
                        </button>
                      ))}
                    </div>
                    {method==="Cash" ? (
                      <Card>
                        <div style={{fontSize:18,fontWeight:600,marginBottom:16}}>💵 Cash Payment</div>
                        <Field label="Cash Tendered" required value={tendered} onChange={setTendered} placeholder="0.00" fontSize={20} />
                        <div style={{fontSize:13,color:"var(--text-secondary)",margin:"16px 0 10px"}}>Quick Amount</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                          {[5,10,20,50,100].map((a)=>(
                            <Button key={a} variant="secondary" onClick={()=>setTendered(String(a))} style={{padding:"10px 0"}}>{window.HELA_DATA.fmt(a)}</Button>
                          ))}
                          <Button variant="secondary" onClick={()=>setTendered(total.toFixed(2))} style={{padding:"10px 0"}}>Exact</Button>
                        </div>
                        {t>0&&(
                          <div style={{background:"var(--bg-secondary)",borderRadius:8,padding:18,marginTop:18,
                            display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{color:"var(--text-secondary)"}}>Change Due</span>
                            <span style={{fontSize:30,fontWeight:700,color:"var(--success)"}}>{fmt(change)}</span>
                          </div>
                        )}
                      </Card>
                    ) : method==="Mixed" ? (
                      <Card>
                        <div style={{fontSize:18,fontWeight:600,marginBottom:16}}>🔀 Split Payment</div>
                        <div style={{display:"flex",gap:8,marginBottom:12}}>
                          {splitMethods.map((m)=>(
                            <button key={m} onClick={()=>setSplitMethod(m)} style={{flex:1,padding:"9px 0",borderRadius:8,cursor:"pointer",
                              fontFamily:"var(--font-sans)",fontSize:13,fontWeight:600,
                              border:"1px solid "+(splitMethod===m?"var(--primary)":"var(--border)"),
                              background:splitMethod===m?"var(--primary-light)":"var(--surface)",color:"var(--text-primary)"}}>
                              {m==="Credit"?"🎁 Credit":m}</button>
                          ))}
                        </div>
                        {splitMethod==="Credit" && <div style={{fontSize:12,color:"var(--primary)",marginBottom:8}}>Available store credit: {fmt(creditAvail)}</div>}
                        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                          <div style={{flex:1}}><Field label={"Amount (remaining "+fmt(remaining)+")"} value={splitAmt} onChange={setSplitAmt} placeholder={remaining.toFixed(2)} /></div>
                          <Button onClick={addTender} style={{height:42}}>Add</Button>
                        </div>
                        <div style={{marginTop:14}}>
                          {tenders.length===0 ? <div style={{fontSize:12,color:"var(--text-tertiary)"}}>Add one or more tenders to cover the total.</div>
                            : tenders.map((x,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                              <span style={{fontSize:13,fontWeight:600}}>{x.method}</span>
                              <span style={{display:"flex",gap:10,alignItems:"center"}}>
                                <b>{fmt(x.amount)}</b>
                                <button onClick={()=>setTenders((a)=>a.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-tertiary)"}}>✕</button>
                              </span>
                            </div>
                          ))}
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontWeight:700}}>
                            <span>Paid {fmt(paidSplit)}</span>
                            <span style={{color:remaining>0?"var(--error)":"var(--success)"}}>{remaining>0?("Due "+fmt(remaining)):("Change "+fmt(change))}</span>
                          </div>
                        </div>
                      </Card>
                    ) : method==="Credit" ? (
                      <Card>
                        <div style={{fontSize:18,fontWeight:600,marginBottom:16}}>🎁 Store Credit</div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                          <span style={{color:"var(--text-secondary)"}}>Available credit</span>
                          <span style={{fontWeight:700}}>{fmt(credit)}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                          <span style={{color:"var(--text-secondary)"}}>Applied to this sale</span>
                          <span style={{fontWeight:700,color:"var(--primary)"}}>{fmt(Math.min(total,credit))}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--border)",paddingTop:10}}>
                          <span style={{color:"var(--text-secondary)"}}>Remaining after sale</span>
                          <span style={{fontWeight:700,color:"var(--success)"}}>{fmt(Math.max(0,credit-total))}</span>
                        </div>
                        {credit<total && <div style={{background:"var(--bg-secondary)",borderRadius:6,padding:12,fontSize:12,color:"var(--error)",marginTop:14}}>
                          Insufficient credit ({fmt(credit)}) for {fmt(total)}. Use <b>Mixed</b> to combine store credit with another tender.
                        </div>}
                      </Card>
                    ) : (
                      <Card>
                        <div style={{fontSize:18,fontWeight:600,marginBottom:16}}>
                          {method==="Card"?"💳 Card Payment":"📱 Mobile Payment"}
                        </div>
                        <div style={{background:"var(--bg-secondary)",borderRadius:6,padding:12,fontSize:12,color:"var(--text-secondary)"}}>
                          ℹ️ Demo Mode: {method} payments are simulated (terminal integration in the WPF build). Click Complete to finish.
                        </div>
                      </Card>
                    )}
                  </div>
                </div>
                <div style={{background:"var(--surface)",borderLeft:"1px solid var(--border)",display:"flex",flexDirection:"column"}}>
                  <div style={{padding:"15px 20px",background:"var(--bg-secondary)",borderBottom:"1px solid var(--border)",fontSize:18,fontWeight:700}}>
                    Payment Summary
                  </div>
                  <div style={{flex:1,padding:20}}>
                    {[["Method",method],["Total",fmt(total)],
                      ...(method==="Cash"?[["Tendered",fmt(t),"success"]]:[]),
                      ...(creditUsed>0?[["Store credit",fmt(creditUsed),"success"]]:[])]
                      .map(([k,v,tone])=>(
                        <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
                          <span style={{fontSize:14,color:"var(--text-secondary)"}}>{k}</span>
                          <span style={{fontSize:14,fontWeight:600,color:tone==="success"?"var(--success)":"var(--text-primary)"}}>{v}</span>
                        </div>
                    ))}
                  </div>
                  <div style={{padding:20,borderTop:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:10}}>
                    <Button full disabled={!canComplete} onClick={complete} style={{height:48,fontSize:16}}>Complete Transaction</Button>
                    <Button full variant="secondary" onClick={onClose} style={{height:44}}>Cancel</Button>
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      );
    }

    /* ───── Receipt modal ───── */
    function ReceiptModal({ sale, cfg, onClose, onNewSale }) {
      const fmt = window.HELA_DATA.fmt;
      const dash = "------------------------------";
      const Line = ({l,r,bold})=>(
        <div style={{display:"flex",justifyContent:"space-between",fontWeight:bold?700:400,fontSize:bold?14:12.5}}>
          <span>{l}</span><span>{r}</span>
        </div>
      );
      return (
        <div className="no-print" style={{position:"fixed",inset:0,background:"rgba(11,30,64,0.5)",
          display:"flex",alignItems:"center",justifyContent:"center",zIndex:60,padding:20}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
            style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
            <div className="receipt-paper" style={{width:340,background:"#fff",color:"#111827",borderRadius:10,
              boxShadow:"var(--shadow-floating)",padding:"26px 28px",fontFamily:"var(--font-mono)",fontSize:12.5,lineHeight:1.7}}>
              <div style={{textAlign:"center",marginBottom:14}}>
                {cfg.logo
                  ? <img src={cfg.logo} alt="" style={{maxHeight:46,maxWidth:180,marginBottom:6}} />
                  : <div style={{fontFamily:"var(--font-sans)",fontSize:22,fontWeight:800,letterSpacing:".5px"}}>{cfg.storeName}</div>}
                {cfg.receiptHeader && <div style={{fontSize:11,color:"#111827"}}>{cfg.receiptHeader}</div>}
                <div style={{fontSize:11,color:"#6B7280"}}>{cfg.address}</div>
                {cfg.taxId && <div style={{fontSize:11,color:"#6B7280"}}>Tax No: {cfg.taxId}</div>}
              </div>
              <div style={{color:"#9CA3AF"}}>{dash}</div>
              <Line l="Invoice" r={sale.invoiceNo||sale.no} />
              <Line l="Date"    r={sale.date} />
              {sale.type  && <Line l="Type"    r={sale.type} />}
              {sale.table && <Line l="Table"   r={sale.table} />}
              {sale.customer && <Line l="Customer" r={sale.customer.name} />}
              <Line l="Cashier" r={sale.cashier||"Admin"} />
              <div style={{color:"#9CA3AF"}}>{dash}</div>
              {sale.items.map((i,idx)=>(
                <div key={idx} style={{margin:"4px 0"}}>
                  <div>{i.name}</div>
                  {i.mods&&i.mods.length>0&&<div style={{fontSize:11,color:"#6B7280",paddingLeft:8}}>{window.HELA_MODLABEL(i.mods)}</div>}
                  {i.note&&<div style={{fontSize:11,color:"#6B7280",paddingLeft:8,fontStyle:"italic"}}>{i.note}</div>}
                  <Line l={"  "+i.qty+" x "+fmt(i.price)} r={fmt(i.qty*i.price)} />
                </div>
              ))}
              <div style={{color:"#9CA3AF"}}>{dash}</div>
              <Line l="Subtotal" r={fmt(sale.subtotal)} />
              {sale.discount>0&&<Line l={"Discount"+(sale.coupon?" ("+sale.coupon+")":"")} r={"-"+fmt(sale.discount)} />}
              {sale.service>0&&<Line l="Service" r={fmt(sale.service)} />}
              <Line l={(cfg.taxLabel||"Tax")+" ("+(sale.taxRate!=null?sale.taxRate:cfg.taxRate)+"%)"} r={fmt(sale.tax)} />
              {sale.rounding!=null&&sale.rounding!==0&&<Line l="Rounding" r={(sale.rounding>0?"+":"")+fmt(sale.rounding)} />}
              <Line l="TOTAL" r={fmt(sale.total)} bold />
              <div style={{color:"#9CA3AF"}}>{dash}</div>
              {sale.splitInfo
                ? <React.Fragment>
                    <Line l={"Split into "+sale.splitInfo.parts} r="" />
                    {sale.splitInfo.bills.map((b,i)=><Line key={i} l={"  "+b.invoiceNo+" ("+b.method+")"} r={fmt(b.total)} />)}
                  </React.Fragment>
                : sale.tenders
                ? sale.tenders.map((t,i)=><Line key={i} l={"Paid ("+t.method+")"} r={fmt(t.amount)} />)
                : <Line l={"Paid ("+sale.method+")"} r={fmt(sale.method==="Cash"?(sale.tendered||sale.total):sale.total)} />}
              {sale.method==="Cash"&&sale.change>0&&<Line l="Change" r={fmt(sale.change)} />}
              <div style={{color:"#9CA3AF"}}>{dash}</div>
              {sale.customer && sale.earned>0 && (
                <div style={{textAlign:"center",marginTop:8,fontSize:11,color:"#111827",fontWeight:700}}>
                  {sale.customer.name} earned {sale.earned} loyalty points
                  <div style={{fontWeight:400,color:"#6B7280"}}>New balance: {sale.customer.points + sale.earned} pts</div>
                </div>
              )}
              {sale.customer && sale.creditUsed>0 && (
                <div style={{textAlign:"center",marginTop:6,fontSize:11,color:"#111827",fontWeight:700}}>
                  Store credit used: {fmt(sale.creditUsed)}
                  <div style={{fontWeight:400,color:"#6B7280"}}>Credit remaining: {fmt(Math.max(0,(sale.customer.credit||0)-sale.creditUsed))}</div>
                </div>
              )}
              <div style={{textAlign:"center",marginTop:12,fontSize:11,color:"#6B7280"}}>

    /* ───── Reports ───── */
    function ReportsScreen({ cfg }) {
      const D = window.HELA_DATA, fmt = D.fmt;
      const [range, setRange] = useState("All");
      const allBills = window.HelaDB.all("bills");
      const now = Date.now();
      const since = range==="Day" ? now-864e5 : range==="Week" ? now-7*864e5 : range==="Month" ? now-30*864e5 : 0;
      const bills = allBills.filter((b)=>(b.ts||0)>=since);
      const sales = bills.filter((b)=>b.kind!=="refund");
      const refunds = bills.filter((b)=>b.kind==="refund");

      const revenue = sales.reduce((s,b)=>s+b.total,0);
      const taxColl = sales.reduce((s,b)=>s+(b.tax||0),0);
      const cogs    = sales.reduce((s,b)=>s+(b.cost||0),0);
      const profit  = revenue - taxColl - cogs;
      const itemsSold = sales.reduce((s,b)=>s+b.items.reduce((a,i)=>a+i.qty,0),0);
      const refundTotal = refunds.reduce((s,b)=>s+Math.abs(b.total),0);
      const avg = sales.length ? revenue/sales.length : 0;

      // payment mix
      const methods = ["Cash","Card","Mobile","Mixed"];
      const payMix = methods.map((m)=>({ m, v:sales.filter((b)=>b.method===m).reduce((s,b)=>s+b.total,0) }))
        .filter((x)=>x.v>0);
      const payMax = Math.max(1,...payMix.map((x)=>x.v));

      // category sales
      const catMap = {};
      sales.forEach((b)=>b.items.forEach((i)=>{ const p=window.HelaDB.get("products",i.id)||{}; const c=p.cat||i.cat||"other";
        catMap[c]=(catMap[c]||0)+i.price*i.qty; }));
      const cats = Object.keys(catMap).map((c)=>({ c, v:catMap[c] })).sort((a,b)=>b.v-a.v);
      const catMax = Math.max(1,...cats.map((x)=>x.v));

      // top sellers by qty
      const itemMap = {};
      sales.forEach((b)=>b.items.forEach((i)=>{ itemMap[i.name]=(itemMap[i.name]||0)+i.qty; }));
      const top = Object.keys(itemMap).map((n)=>({ n, q:itemMap[n] })).sort((a,b)=>b.q-a.q).slice(0,6);
      const topMax = Math.max(1,...top.map((x)=>x.q));

      const empty = sales.length===0;
      return (
        <div>
          <SubHeader title="Reports & Analytics" subtitle={sales.length+" sales · live from HelaDB"}
            right={<div style={{display:"flex",gap:8}}>
              {["Day","Week","Month","All"].map((p)=>(
                <button key={p} onClick={()=>setRange(p)} style={{fontSize:13,fontWeight:600,borderRadius:16,padding:"8px 16px",border:"none",cursor:"pointer",fontFamily:"var(--font-sans)",
                  background:range===p?"var(--primary)":"var(--bg-secondary)",color:range===p?"#fff":"var(--text-secondary)"}}>{p}</button>
              ))}
            </div>} />
          <div style={{padding:"28px 40px"}}>
            {empty && <div style={{padding:"10px 0 24px",color:"var(--text-tertiary)",fontSize:13}}>No sales in this range yet — complete a sale and the analytics fill in automatically.</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:15,marginBottom:20}}>
              {[["💰","Revenue",fmt(revenue)],["🧾","Transactions",String(sales.length)],
                ["📦","Items Sold",String(itemsSold)],["📈","Avg Sale",fmt(avg)]].map(([ic,l,v])=>(
                <Card key={l} lift>
                  <span style={{fontSize:28}}>{ic}</span>
                  <div style={{fontSize:13,color:"var(--text-secondary)",margin:"10px 0 4px"}}>{l}</div>
                  <div style={{fontSize:24,fontWeight:700}}>{v}</div>
                </Card>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:15,marginBottom:28}}>
              {[["Gross Profit",fmt(profit),"var(--success)"],["Tax Collected",fmt(taxColl),"var(--text-primary)"],
                ["Cost of Goods",fmt(cogs),"var(--text-primary)"],["Refunds",fmt(refundTotal),"var(--error)"]].map(([l,v,c])=>(
                <div key={l} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"14px 16px",boxShadow:"var(--shadow-card)"}}>
                  <div style={{fontSize:12,color:"var(--text-secondary)"}}>{l}</div>
                  <div style={{fontSize:20,fontWeight:800,color:c,marginTop:4}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:15,marginBottom:15}}>
              <Card lift>
                <div style={{fontSize:18,fontWeight:600,marginBottom:18}}>💳 Payment Mix</div>
                {payMix.length===0 ? <div style={{color:"var(--text-tertiary)",fontSize:13}}>No data.</div> :
                  payMix.map((x)=>(
                  <div key={x.m} style={{marginBottom:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                      <span style={{fontWeight:600}}>{x.m}</span><span style={{color:"var(--text-secondary)"}}>{fmt(x.v)}</span>
                    </div>
                    <div style={{height:8,borderRadius:4,background:"var(--bg-secondary)"}}>
                      <div style={{height:"100%",width:(x.v/payMax*100)+"%",borderRadius:4,background:"var(--accent-gradient)"}} />
                    </div>
                  </div>
                ))}
              </Card>
              <Card lift>
                <div style={{fontSize:18,fontWeight:600,marginBottom:18}}>🍽️ Sales by Category</div>
                {cats.length===0 ? <div style={{color:"var(--text-tertiary)",fontSize:13}}>No data.</div> :
                  cats.map((x)=>(
                  <div key={x.c} style={{marginBottom:12}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                      <span style={{fontWeight:600,textTransform:"capitalize"}}>{x.c}</span><span style={{color:"var(--text-secondary)"}}>{fmt(x.v)}</span>
                    </div>
                    <div style={{height:8,borderRadius:4,background:"var(--bg-secondary)"}}>
                      <div style={{height:"100%",width:(x.v/catMax*100)+"%",borderRadius:4,background:"var(--info-gradient)"}} />
                    </div>
                  </div>
                ))}
              </Card>
            </div>
            <Card lift>
              <div style={{fontSize:18,fontWeight:600,marginBottom:18}}>🏆 Top Sellers (by qty)</div>
              {top.length===0 ? <div style={{color:"var(--text-tertiary)",fontSize:13}}>No data.</div> :
                top.map((x)=>(
                <div key={x.n} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                    <span style={{fontWeight:600}}>{x.n}</span><span style={{color:"var(--text-secondary)"}}>{x.q} sold</span>
                  </div>
                  <div style={{height:8,borderRadius:4,background:"var(--bg-secondary)"}}>
                    <div style={{height:"100%",width:(x.q/topMax*100)+"%",borderRadius:4,background:"var(--accent-gradient)"}} />
                  </div>
                </div>
              ))}
            </Card>
          </div>
        </div>
      );
    }

                  background:window.HelaDB.isEncrypted()?"var(--success)":"var(--text-tertiary)"}}>
                  At rest: {window.HelaDB.isEncrypted()?"AES-GCM":"plaintext"}
                </span>
              </div>
            </Card>

            <div style={{fontSize:12,color:"var(--text-tertiary)",textAlign:"center",paddingBottom:10}}>
              Changes are saved automatically and applied across the whole app.
            </div>
          </div>

          {encPass!==null && (
            <div style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",display:"flex",
              alignItems:"center",justifyContent:"center",zIndex:70,padding:20}} onClick={()=>setEncPass(null)}>
              <div onClick={(e)=>e.stopPropagation()} className="anim-slide"
                style={{width:400,background:"var(--bg)",borderRadius:"var(--radius-lg)",boxShadow:"var(--shadow-floating)",overflow:"hidden"}}>
                <div style={{padding:"18px 22px",borderBottom:"1px solid var(--border)",fontSize:18,fontWeight:700}}>Set encryption passphrase</div>
                <div style={{padding:"20px 22px",display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{fontSize:13,color:"var(--text-secondary)"}}>
                    You'll need this passphrase to open the app. There's no recovery — store it safely.
                  </div>
                  <Field label="Passphrase (min 6 chars)" type="password" value={encVal} onChange={setEncVal} />
                  {encErr && <div style={{color:"var(--error)",fontSize:12}}>{encErr}</div>}
                </div>
                <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",display:"flex",gap:10,justifyContent:"flex-end"}}>
                  <Button variant="secondary" onClick={()=>setEncPass(null)}>Cancel</Button>
                  <Button disabled={encVal.length<6} onClick={enableEnc}>Enable</Button>

          )}
        </div>
      );
