<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HelaPOS — UI Kit</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; font-family: var(--font-sans); color: var(--text-primary); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    @media print {
      body * { visibility: hidden !important; }
      .receipt-paper, .receipt-paper * { visibility: visible !important; }
      .receipt-paper { position: fixed !important; left: 50%; top: 20px; transform: translateX(-50%); box-shadow: none !important; }
      .no-print { display: none !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="data.js"></script>
  <script src="config.js"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="SaleScreen.jsx"></script>
  <script type="text/babel" src="PaymentModal.jsx"></script>
  <script type="text/babel" src="ReceiptModal.jsx"></script>
  <script type="text/babel" src="ReportsScreen.jsx"></script>
  <script type="text/babel" src="SettingsScreen.jsx"></script>
  <script type="text/babel" src="Modules.jsx"></script>
  <script type="text/babel" src="Inventory.jsx"></script>
  <script type="text/babel" src="CustomersCashier.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
