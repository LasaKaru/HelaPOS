<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.ico{display:flex;flex-wrap:wrap;gap:16px;font-size:30px}
  .ico div{display:flex;flex-direction:column;align-items:center;gap:4px;width:60px}
  .ico .c{font-size:10px;color:var(--text-tertiary)}</style></head>
<body>
  <div class="lbl">Emoji as iconography — the product's real icon system</div>
  <div class="ico" style="margin-top:12px">
    <div>💰<span class="c">sales</span></div>
    <div>🧾<span class="c">txns</span></div>
    <div>👥<span class="c">customers</span></div>
    <div>📦<span class="c">inventory</span></div>
    <div>📊<span class="c">reports</span></div>
    <div>👔<span class="c">employees</span></div>
    <div>💳<span class="c">card</span></div>
    <div>💵<span class="c">cash</span></div>
    <div>⚙️<span class="c">settings</span></div>
    <div>🏆<span class="c">top</span></div>
    <div>⚠️<span class="c">alerts</span></div>
    <div>➕<span class="c">new sale</span></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:14px">One leading glyph per heading/tile. No custom icon font or SVG set in the codebase.</p>
</body></html>
