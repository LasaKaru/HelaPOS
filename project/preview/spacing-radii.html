<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.box{width:108px;height:78px;background:var(--bg-secondary);border:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
  .box span{font-size:11px;color:var(--text-secondary)}
  .box b{color:var(--text-primary)}</style></head>
<body>
  <div class="row" style="flex-wrap:nowrap">
    <div class="box" style="border-radius:6px"><span><b>6px</b> · buttons / inputs</span></div>
    <div class="box" style="border-radius:8px"><span><b>8px</b> · cards / badges</span></div>
    <div class="box" style="border-radius:12px"><span><b>12px</b> · tiles / elevated</span></div>
    <div class="box" style="border-radius:16px;width:130px"><span><b>16px</b> · pills</span></div>
  </div>
</body></html>
