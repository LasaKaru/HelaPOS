<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .list{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;max-width:380px}
  .item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;
    border-bottom:1px solid var(--border)}
  .item:last-child{border-bottom:none}
  .item.sel{background:var(--primary-light)}
  .item.hover{background:var(--bg-secondary)}
  .nm{font-weight:600;font-size:14px} .sub{font-size:12px;color:var(--text-secondary)}
  .amt{font-weight:700;color:var(--primary)}</style></head>
<body>
  <div class="list">
    <div class="item sel"><div><div class="nm">RCP-00482</div><div class="sub">10:24:11 · selected</div></div><span class="amt">$24.80</span></div>
    <div class="item hover"><div><div class="nm">RCP-00481</div><div class="sub">10:19:02 · hover</div></div><span class="amt">$8.50</span></div>
    <div class="item"><div><div class="nm">RCP-00480</div><div class="sub">10:11:47</div></div><span class="amt">$52.00</span></div>
  </div>
  <p class="muted" style="font-size:11px;margin-top:12px">List rows: hover greys, selection uses the pale-amber tint (#FEF3C7).</p>
</body></html>
