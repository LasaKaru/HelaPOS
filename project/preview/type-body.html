<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.spec{display:flex;align-items:baseline;gap:16px;margin-bottom:11px}
  .spec .meta{font-size:11px;color:var(--text-tertiary);width:120px;flex:none}</style></head>
<body>
  <div class="spec"><span class="meta mono">Card title · 18 / 600</span><span class="t-h3">Recent Transactions</span></div>
  <div class="spec"><span class="meta mono">Heading · 16 / 600</span><span class="t-h4">This Week</span></div>
  <div class="spec"><span class="meta mono">Body · 14 / 400</span><span class="t-body">Select payment method and enter details.</span></div>
  <div class="spec"><span class="meta mono">Label · 14 / 600</span><span class="t-label">Cardholder Name</span></div>
  <div class="spec"><span class="meta mono">Caption · 13 / 400</span><span class="t-caption">Friday, June 02, 2026 · Administrator</span></div>
  <div class="spec"><span class="meta mono">Small · 12 / 400</span><span class="t-small">16 products</span></div>
  <div class="spec"><span class="meta mono">Badge · 11 / 600</span><span class="t-tiny" style="color:var(--success)">+12%</span></div>
</body></html>
